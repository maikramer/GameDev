# Quality profiles — cross-tool parameter mapping.
# Each tier maps per-tool settings for the full pipeline.
#
# Usage:
#   engine = QualityEngine()
#   r = engine.resolve("text2sound", quality="medium", category="weapon")

profiles:
  fast:
    label: "Fast (~30s/asset, minimum viable quality)"
    text2d:
      width: 512
      height: 512
      steps: 4
      guidance: 1.0
    text3d:
      preset: fast
      guidance: 5.0
    paint3d:
      max_views: 2
      view_resolution: 384
      render_size: 1024
      texture_size: 1024
      bake_exp: 6
      smooth: true
      smooth_passes: 2
    texture2d:
      width: 512
      height: 512
      steps: 20
      guidance: 7.0
    skymap2d:
      width: 1024
      height: 512
      steps: 14
      guidance: 3.0
    part3d:
      steps: 12
      octree: 128
      chunks: 4096
    text2sound:
      steps: 12
      cfg_scale: 4.0
      sigma_min: 0.5
      sigma_max: 500.0
      sampler: dpmpp-3m-sde
      crossfade_ms: 300
    simplify:
      face_ratio: 0.25
      texture_size: 1024
    rigging3d:
      smooth_iterations: 1
      groups_per_vertex: 4
      low_vram: true
    terrain3d:
      size: 512
      world_size: 256.0
      coarse_window: 2
      island_noise_scale: 0.12
      island_noise_freq: 2.5
      smooth_iterations: 2
      elevation_gamma: 1.1
      elevation_contrast: 0.05
    rocks3d:
      subdivisions: 2
      octaves: 2
      frequency: 3.0
      amplitude: 0.15
      erosion_passes: 0
      texture_resolution: 256

