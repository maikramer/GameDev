# Quality profiles — cross-tool parameter mapping.
# Each tier maps per-tool settings for the full pipeline.
#
# Usage:
#   engine = QualityEngine()
#   r = engine.resolve("text2sound", quality="medium", category="weapon")

profiles:
  fast:
    label: "Fast (~30s/asset, minimum viable quality)"
    text2d:
      width: 512
      height: 512
      steps: 4
      guidance: 1.0
    text3d:
      preset: fast
      guidance: 5.0
    paint3d:
      max_views: 2
      view_resolution: 384
      render_size: 1024
      texture_size: 1024
      bake_exp: 6
      smooth: true
      smooth_passes: 2
    texture2d:
      width: 512
      height: 512
      steps: 14
      guidance: 3.0
    skymap2d:
      width: 1024
      height: 512
      steps: 14
      guidance: 3.0
    part3d:
      steps: 12
      octree: 128
      chunks: 4096
    text2sound:
      steps: 12
      cfg_scale: 4.0
      sigma_min: 0.5
      sigma_max: 500.0
      sampler: dpmpp-3m-sde
    simplify:
      face_ratio: 0.25
      texture_size: 1024

