<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloatingText Harness</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e1a;
        color: #e8eef8;
        font-family: system-ui, sans-serif;
      }
      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #1a2030;
      }
      .probe-bar {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 50;
        display: flex;
        gap: 8px;
      }
      .probe-bar button {
        padding: 8px 14px;
        background: rgba(20, 28, 50, 0.85);
        color: #e8eef8;
        border: 1px solid rgba(120, 150, 220, 0.4);
        border-radius: 8px;
        font: 600 13px system-ui, sans-serif;
        cursor: pointer;
      }
      .probe-bar button:hover {
        background: rgba(40, 60, 100, 0.95);
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div class="probe-bar">
      <button id="spawn-screen">Spawn screen float</button>
      <button id="spawn-world">Spawn world float</button>
      <button id="spawn-crit">Spawn crit</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
