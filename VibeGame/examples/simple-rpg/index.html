<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Simples — Vale do Cristal (VibeGame)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <Scene
      canvas="#game-canvas"
      sky="#ffffff"
      resume-audio-on-user-gesture="true"
    >
      <Skybox url="/assets/sky/sky.png"></Skybox>

      <!-- Fill + sol: mais fill no hemisfério + sol um pouco mais alto = sombras mais curtas e terreno menos “enterrado”. -->
      <GameObject
        ambient-light="sky-color: 0xd8ecff; ground-color: 0x726a58; intensity: 0.84"
        directional-light="color: 0xfff8f2; intensity: 1.78; direction-x: -0.92; direction-y: 1.55; direction-z: -0.78; cast-shadow: 1; shadow-map-size: 4096; distance: 120"
      >
      </GameObject>

      <AudioSource
        name="bgm"
        url="/assets/audio/bgm_field.wav"
        loop="true"
        volume="0.18"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-jump"
        url="/assets/audio/sfx_jump.wav"
        loop="false"
        volume="0.42"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-save"
        url="/assets/audio/sfx_save.wav"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-load"
        url="/assets/audio/sfx_load.wav"
        loop="false"
        volume="0.44"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-heal"
        url="/assets/audio/sfx_collect.wav"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>

      <!-- 10 km × 10 km terrain — 16×16 chunks (levels=4), 2048×2048 heightmap. -->
      <Terrain
        pos="0 0 0"
        world-size="10000"
        max-height="200"
        levels="4"
        resolution="128"
        lod-hysteresis="1.3"
        lod-distance-ratio="2"
        height-smoothing="0.3"
        height-smoothing-spread="1.25"
        heightmap="/assets/terrain/heightmap.png"
        collision-resolution="128"
        skirt-width="0.015625"
        roughness="0.85"
        metalness="0"
        normal-strength="0.6"
        base-color="#96ad78"
      ></Terrain>

      <!-- Água gerada dinamicamente a partir de /assets/terrain/terrain.json no bootstrap. -->

      <Fog
        color="#dde6d4"
        density="0.00014"
        mode="exponential"
        height-falloff="0.48"
        base-height="0"
        volumetric-strength="0.009"
        quality="medium"
        noise-scale="0.28"
      ></Fog>

      <!-- Terreno XZ ∈ [-5000,5000] centrado na origem (world-size 10000). Colocar o herói no centro da ilha + câmera a olhar para dentro do mapa. -->
      <PlayerGLTF
        name="hero"
        pos="0 200 0"
        model-url="/assets/meshes/hero_rigged_animated.glb"
        script="auto-attacker.ts"
      ></PlayerGLTF>

      <GameObject name="WaveManager" script="wave-manager.ts"></GameObject>

      <!-- Pós: nítido primeiro (sem CA); bloom/grain/vignette moderados — o pacote “AAA” anterior é que “desfocava”. -->
      <!-- Post-processing temporarily disabled for debugging -->
      <FollowCamera
        target-distance="12"
        target-pitch="0.32"
        yaw-smoothness="0.055"
        position-lag="0.18"
        auto-rotate-delay="0.55"
      ></FollowCamera>

      <!-- Meshes em public/assets/meshes/ (LOD: por agora só *_lod0.glb; troca por distância virá depois). -->
      <!-- Pilares: euler 0 no spawn (assets já Y-up / pés no chão pelo pipeline). -->
      <SpawnGroup
        profile="tree"
        count="80"
        seed="11"
        region-min="-4500 0 -4500"
        region-max="4500 0 4500"
        max-slope-attempts="180"
        pick-strategy="random"
        scale-min="1.5"
        scale-max="1.5"
        max-distance="550"
        surface-epsilon-auto="true"
      >
        <GLTFDynamic
          role="dynamic"
          profile="gltf-crate"
          url="/assets/meshes/stone_pillar_lod0.glb"
          body-type="fixed"
          collider-shape="capsule"
          collider-margin="-0.12"
          transform="euler: 0 0 0"
        ></GLTFDynamic>
      </SpawnGroup>

      <SpawnGroup
        profile="gltf-crate"
        count="60"
        seed="23"
        region-min="-4200 0 -4200"
        region-max="4200 0 4200"
        max-slope-attempts="120"
        pick-strategy="random"
        max-distance="450"
        surface-epsilon-auto="true"
      >
        <GLTFDynamic
          role="dynamic"
          profile="gltf-crate"
          url="/assets/meshes/wooden_crate_lod0.glb"
          body-type="dynamic"
          collider-shape="box"
          transform="scale: 1 1 1"
        ></GLTFDynamic>
      </SpawnGroup>

      <SpawnGroup
        profile="tree"
        count="300"
        seed="7"
        region-min="-2000 0 -2000"
        region-max="2000 0 2000"
        max-slope-attempts="220"
        pick-strategy="random"
        scale-min="1.5"
        scale-max="4"
        scale-distribution="linear"
        yaw-distribution="discrete"
        yaw-step-deg="45"
        max-distance="400"
        surface-epsilon-auto="true"
      >
        <GLTFDynamic
          role="dynamic"
          profile="gltf-crate"
          url="/assets/meshes/tree_lowpoly_lod0.glb"
          body-type="fixed"
          collider-shape="capsule"
          collider-margin="-0.18"
          transform="scale: 1 1 1"
        ></GLTFDynamic>
      </SpawnGroup>
    </Scene>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
