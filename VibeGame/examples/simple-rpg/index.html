<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Simples — Vale do Cristal (VibeGame)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <Scene
      canvas="#game-canvas"
      sky="#ffffff"
      resume-audio-on-user-gesture="true"
    >
      <Skybox url="/assets/sky/sky.png"></Skybox>

      <!-- Fill + sol: mais fill no hemisfério + sol um pouco mais alto = sombras mais curtas e terreno menos “enterrado”. -->
      <GameObject
        ambient-light="sky-color: 0xd8ecff; ground-color: 0x726a58; intensity: 0.84"
        directional-light="color: 0xfff8f2; intensity: 1.78; direction-x: -0.92; direction-y: 1.55; direction-z: -0.78; cast-shadow: 1; shadow-map-size: 4096; distance: 55"
      >
      </GameObject>

      <AudioSource
        name="bgm"
        url="/assets/audio/bgm_field.wav"
        loop="true"
        volume="0.18"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-jump"
        url="/assets/audio/sfx_jump.wav"
        loop="false"
        volume="0.42"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-save"
        url="/assets/audio/sfx_save.wav"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-load"
        url="/assets/audio/sfx_load.wav"
        loop="false"
        volume="0.44"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-heal"
        url="/assets/audio/collect_sfx.wav"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>

      <!-- Relva: tom um pouco mais claro para ler melhor nas sombras (sem mexer no motor). -->
      <Terrain
        pos="0 0 0"
        world-size="384"
        max-height="28"
        levels="6"
        resolution="64"
        lod-hysteresis="1.25"
        lod-distance-ratio="2"
        height-smoothing="0.48"
        height-smoothing-spread="1.35"
        collision-resolution="64"
        skirt-width="0.015625"
        roughness="0.5"
        metalness="0"
        normal-strength="0.8"
        base-color="#96ad78"
      ></Terrain>

      <!-- Água: tom menos “ciano de poço”; water-level alinhado ao Y. -->
      <Water
        pos="0 1.25 0"
        water-level="1.25"
        size="384"
        opacity="0.22"
        wave-speed="1.0"
        wave-scale="0.3"
        tint-r="0.14"
        tint-g="0.38"
        tint-b="0.34"
        underwater-fog-color-r="0.0"
        underwater-fog-color-g="0.1"
        underwater-fog-color-b="0.3"
        underwater-fog-density="0.2"
      ></Water>

      <Fog
        color="#dde6d4"
        density="0.001"
        mode="exponential"
        height-falloff="0.48"
        base-height="0"
        volumetric-strength="0.016"
        quality="medium"
        noise-scale="0.28"
      ></Fog>

      <PlayerGLTF
        name="hero"
        pos="0 60 0"
        model-url="/assets/models/hero.glb"
        script="auto-attacker.ts"
      ></PlayerGLTF>

      <GameObject name="WaveManager" script="wave-manager.ts"></GameObject>

      <!-- Pós: nítido primeiro (sem CA); bloom/grain/vignette moderados — o pacote “AAA” anterior é que “desfocava”. -->
      <FollowCamera
        target-distance="7"
        target-pitch="0.32"
        yaw-smoothness="0.055"
        position-lag="0.18"
        auto-rotate-delay="0.55"
        smaa="preset: high"
        bloom="intensity: 1.52; luminance-threshold: 0.78; luminance-smoothing: 0.4; mipmap-blur: 1; radius: 0.9; levels: 8"
        vignette="darkness: 0.24; offset: 0.14"
        noise="opacity: 0.028; blend-function: normal"
        tonemapping="mode: aces-filmic; middle-grey: 0.82; white-point: 6.8; average-luminance: 1.2; adaptation-rate: 1.0"
      ></FollowCamera>

      <!-- Props: <GameObject place="at: …"> = XZ fixo + altura/alinhamento ao terreno -->
      <GameObject place="at: 0 -8">
        <GLTFLoader
          role="visual"
          url="/assets/models/stone_pillar.glb"
          transform="scale: 1.5 1.5 1.5"
        ></GLTFLoader>
        <ParticleSystem
          preset="sparks"
          rate="28"
          lifetime="0.9"
          size="0.12"
          transform="pos: 0 1.4 0"
        ></ParticleSystem>
      </GameObject>



      <GameObject place="at: -1.5 -9">
        <GLTFDynamic
          role="dynamic"
          url="/assets/models/treasure_chest.glb"
          body-type="fixed"
          collider-shape="box"
          script="chest-interaction.ts"
          transform="scale: 1.1 1.1 1.1"
        ></GLTFDynamic>
      </GameObject>



      <GameObject place="at: -18 -6">
        <GLTFDynamic
          role="dynamic"
          url="/assets/models/rock_boulder.glb"
          body-type="fixed"
          collider-shape="sphere"
          transform="scale: 1.4 1.4 1.4"
        ></GLTFDynamic>
      </GameObject>
      <GameObject place="at: 22 6">
        <GLTFDynamic
          role="dynamic"
          url="/assets/models/rock_boulder.glb"
          body-type="fixed"
          collider-shape="sphere"
          transform="scale: 1.1 1.1 1.1"
        ></GLTFDynamic>
      </GameObject>
      <GameObject place="at: -8 18">
        <GLTFDynamic
          role="dynamic"
          url="/assets/models/rock_boulder.glb"
          body-type="fixed"
          collider-shape="sphere"
          transform="scale: 0.9 0.9 0.9"
        ></GLTFDynamic>
      </GameObject>




      <SpawnGroup
        profile="tree"
        count="18"
        seed="7"
        region-min="-55 0 -55"
        region-max="55 0 55"
        pick-strategy="random"
      >
        <GLTFDynamic
          role="dynamic"
          profile="tree"
          url="/assets/models/tree_lowpoly.glb"
          body-type="fixed"
          collider-shape="box"
          transform="scale: 1 1 1"
        ></GLTFDynamic>
      </SpawnGroup>

      <SpawnGroup profile="tree" count="10" seed="42" region-min="-45 0 -45" region-max="45 0 45" pick-strategy="random">
        <GLTFDynamic role="dynamic" profile="tree" url="/assets/models/rock_boulder.glb" collider-shape="sphere" body-type="fixed" transform="scale: 1.2 1.2 1.2"></GLTFDynamic>
      </SpawnGroup>

    </Scene>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
