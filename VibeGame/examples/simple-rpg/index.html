<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple RPG Demo — GameAssets + VibeGame</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <world canvas="#game-canvas" sky="#87CEEB">
    <terrain pos="0 0 0" world-size="256" max-height="50" levels="6" resolution="64" lod-hysteresis="1.25"
      lod-distance-ratio="2" height-smoothing="0.35" height-smoothing-spread="1.25" collision-resolution="64"
      skirt-width="0.015625" roughness="0.82" base-color="#8bc34a"></terrain>

    <water pos="0 5 0" size="256" opacity="0.8" wave-speed="1.0" wave-scale="0.3" underwater-fog-color-r="0.0"
      underwater-fog-color-g="0.1" underwater-fog-color-b="0.3" underwater-fog-density="0.2"></water>

    <fog color="#c8d0d8" density="0.012" mode="exponential" height-falloff="0.8" base-height="0"
      volumetric-strength="0.4" quality="medium" noise-scale="0.5"></fog>

    <player-gltf pos="0 60 0" model-url="/assets/models/hero.glb"></player-gltf>

    <follow-camera
      target-distance="6"
      target-pitch="0.35"
      yaw-smoothness="0.07"
      position-lag="0.14"
      auto-rotate-delay="0.4"
      smaa="preset: ultra"
      bloom="intensity: 1.5; luminance-threshold: 0.3; luminance-smoothing: 0.3; mipmap-blur: 1; radius: 0.85"
      depth-of-field="focus-distance: 8; focal-length: 0.1; bokeh-scale: 3; auto-focus: on"
      vignette="darkness: 0.6; offset: 0.2"
      chromatic-aberration="offset-x: 0.003; offset-y: 0.0015"
      dithering="color-bits: 5; intensity: 0.8"
      noise="opacity: 0.15"
      tonemapping="mode: aces-filmic"
    ></follow-camera>

    <!-- Stone pillar: <place> = XZ fixo + altura/alinhamento ao terreno -->
    <place at="0 -8">
      <gltf-load role="visual" url="/assets/models/stone_pillar.glb" transform="scale: 1.5 1.5 1.5"></gltf-load>
    </place>

    <place at="5 3">
      <gltf-load role="visual" url="/assets/models/wooden_crate.glb" transform="scale: 1 1 1"></gltf-load>
    </place>
    <place at="6.2 3.5">
      <gltf-load role="visual" url="/assets/models/wooden_crate.glb" transform="scale: 0.8 0.8 0.8"></gltf-load>
    </place>

    <!-- Crystal effects: deliberately exaggerated so they read as particles, not reflections -->
    <place at="-4 6" y-offset="0.6" ground-align="none">
      <gltf-load role="visual" url="/assets/models/crystal_blue.glb" transform="scale: 0.6 0.6 0.6"></gltf-load>
      <particle-emitter preset="sparks" rate="28" lifetime="2.2" size="0.38"
        transform="pos: 0 1.35 0"></particle-emitter>
      <particle-emitter preset="sparks" rate="16" lifetime="1.6" size="0.18"
        transform="pos: 0 0.9 0"></particle-emitter>
    </place>
    <place at="10 -5" y-offset="0.6" ground-align="none">
      <gltf-load role="visual" url="/assets/models/crystal_blue.glb" transform="scale: 0.5 0.5 0.5"></gltf-load>
      <particle-emitter preset="sparks" rate="24" lifetime="2.0" size="0.32"
        transform="pos: 0 1.2 0"></particle-emitter>
      <particle-emitter preset="sparks" rate="14" lifetime="1.5" size="0.16"
        transform="pos: 0 0.8 0"></particle-emitter>
    </place>

    <!-- Campfire + smoke: y-offset acima do solo amostrado -->
    <place at="0 -8" y-offset="2.5" ground-align="none">
      <particle-emitter preset="fire" rate="40" lifetime="1.2" size="0.25"></particle-emitter>
    </place>
    <place at="0 -8" y-offset="4" ground-align="none">
      <particle-emitter preset="smoke" rate="8" lifetime="3" size="0.4"></particle-emitter>
    </place>

    <place at="12 8" align-to-terrain="0" ground-align="none">
      <npc behavior="wander" max-speed="1.5" max-force="4"></npc>
    </place>
    <place at="-15 -10" align-to-terrain="0" ground-align="none">
      <npc behavior="wander" max-speed="2" max-force="5"></npc>
    </place>
    <place at="20 -18" align-to-terrain="0" ground-align="none">
      <npc behavior="wander" max-speed="1.2" max-force="3"></npc>
    </place>

    <spawn-group profile="tree" count="24" seed="7" region-min="-40 0 -40" region-max="40 0 40" pick-strategy="random">
      <gltf-load role="visual" url="/assets/models/tree_lowpoly.glb" transform="scale: 1 1 1"></gltf-load>
    </spawn-group>

    <spawn-group profile="physics-box" count="6" seed="3" region-min="4 0 2" region-max="10 0 6" pick-strategy="random">
      <dynamic-part role="dynamic" profile="physics-crate"></dynamic-part>
    </spawn-group>

    <spawn-group profile="gltf-crate" count="3" seed="11" region-min="-6 0 8" region-max="-2 0 12">
      <gltf-dynamic role="dynamic" profile="gltf-crate" url="/assets/models/wooden_crate.glb" collider-shape="box"
        transform="scale: 1 1 1"></gltf-dynamic>
    </spawn-group>
  </world>

  <canvas id="game-canvas"></canvas>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
