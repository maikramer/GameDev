<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple RPG Demo — GameAssets + VibeGame</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <!--
      Scene layout generated by gameassets dream (see sample-gameassets/).
      GLBs: gameassets handoff → public/assets/models/<id>.glb
      Sky:  skymap2d generate  → public/assets/sky/sky.png
    -->
    <world canvas="#game-canvas" sky="#87CEEB">
      <!-- Procedural LOD terrain (no heightmap asset required) -->
      <terrain
        pos="0 0 0"
        world-size="256"
        max-height="50"
        levels="6"
        resolution="64"
      ></terrain>

      <!-- Ocean water plane at Y=5, matches terrain world-size -->
      <water
        pos="0 5 0"
        size="256"
        opacity="0.8"
        wave-speed="1.0"
        wave-scale="0.3"
        underwater-fog-color-r="0.0"
        underwater-fog-color-g="0.1"
        underwater-fog-color-b="0.3"
        underwater-fog-density="0.2"
      ></water>

      <!-- Atmospheric fog for forest mood -->
      <fog
        color="#c8d0d8"
        density="0.012"
        mode="exponential"
        height-falloff="0.8"
        base-height="0"
        volumetric-strength="0.4"
        quality="medium"
        noise-scale="0.5"
      ></fog>

      <!-- Player character with animated GLB model -->
      <player-gltf
        pos="0 60 0"
        model-url="/assets/models/hero.glb"
      ></player-gltf>

      <follow-camera
        target-distance="6"
        target-pitch="0.35"
        yaw-smoothness="0.07"
        position-lag="0.14"
        auto-rotate-delay="0.4"
        bloom="intensity: 0.8; luminance-threshold: 0.4; luminance-smoothing: 0.1; mipmap-blur: 1; radius: 0.8"
        vignette="darkness: 0.4; offset: 0.15"
        chromatic-aberration="offset-x: 0.001; offset-y: 0.0005"
        noise="opacity: 0.08"
      ></follow-camera>

      <!-- Stone pillar landmark (origin at model center → lift by ~half height) -->
      <gltf-load
        url="/assets/models/stone_pillar.glb"
        transform="pos: 0 1 -8; scale: 1.5 1.5 1.5"
      ></gltf-load>

      <!-- Wooden crates (origin at center → base at ground) -->
      <gltf-load
        url="/assets/models/wooden_crate.glb"
        transform="pos: 5 0.4 3; scale: 1 1 1"
      ></gltf-load>
      <gltf-load
        url="/assets/models/wooden_crate.glb"
        transform="pos: 6.2 0.3 3.5; scale: 0.8 0.8 0.8"
      ></gltf-load>

      <!-- Blue crystal collectibles (floating above ground) -->
      <gltf-load
        url="/assets/models/crystal_blue.glb"
        transform="pos: -4 0.8 6; scale: 0.6 0.6 0.6"
      ></gltf-load>
      <gltf-load
        url="/assets/models/crystal_blue.glb"
        transform="pos: 10 0.8 -5; scale: 0.5 0.5 0.5"
      ></gltf-load>

      <!-- Árvores: spawn procedural (perfil tree = defaults de vegetação) -->
      <spawn-group
        profile="tree"
        count="24"
        seed="7"
        region-min="-40 0 -40"
        region-max="40 0 40"
        pick-strategy="random"
      >
        <gltf-load
          role="visual"
          url="/assets/models/tree_lowpoly.glb"
          transform="scale: 1 1 1"
        ></gltf-load>
      </spawn-group>

      <!-- Caixas físicas (primitiva): physics-box + physics-crate no filho -->
      <spawn-group
        profile="physics-box"
        count="6"
        seed="3"
        region-min="4 0 2"
        region-max="10 0 6"
        pick-strategy="random"
      >
        <dynamic-part role="dynamic" profile="physics-crate"></dynamic-part>
      </spawn-group>

      <!-- Caixas GLB empurráveis: gltf-crate no grupo e no filho -->
      <spawn-group
        profile="gltf-crate"
        count="3"
        seed="11"
        region-min="-6 0 8"
        region-max="-2 0 12"
      >
        <gltf-dynamic
          role="dynamic"
          profile="gltf-crate"
          url="/assets/models/wooden_crate.glb"
          collider-shape="box"
          transform="scale: 1 1 1"
        ></gltf-dynamic>
      </spawn-group>
    </world>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
