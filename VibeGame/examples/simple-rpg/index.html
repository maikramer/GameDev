<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Simples — Vale do Cristal (VibeGame)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        transform-origin: center center;
        will-change: transform;
      }
    </style>
  </head>

  <body>
    <Scene
      canvas="#game-canvas"
      sky="#ffffff"
      resume-audio-on-user-gesture="true"
    >
      <EquirectSky url="/assets/sky/sky.png"></EquirectSky>

      <!-- Fill + sol: mais fill no hemisfério + sol um pouco mais alto = sombras mais curtas e terreno menos “enterrado”. -->
      <GameObject
        ambient-light="sky-color: 0xfff8f0; ground-color: 0xe0d0a8; intensity: 1.8"
        directional-light="color: 0xfff0d0; intensity: 3.0; direction-x: -0.7; direction-y: 3.5; direction-z: -0.6; cast-shadow: 1; shadow-map-size: 2048; distance: 120"
        postprocessing="enabled: 1; bloom: 1; bloom-strength: 0.55; bloom-radius: 0.6; bloom-threshold: 0.6; chromatic-aberration: 0; ca-strength: 0; vignette: 1; vignette-offset: 0.22; vignette-darkness: 0.62; aa: smaa; tone-mapping: agx; tone-mapping-exposure: 1.05; ssao: 1; ssao-intensity: 0.55; ssao-radius: 0.9"
      >
      </GameObject>

      <!-- Audio mixer tiers + layered music (engine AudioPlugin, T28).
           Crossfade between explore/battle layers is driven from gameplay code. -->
      <AudioMixer master="1" music="0.7" sfx="0.8"></AudioMixer>
      <MusicLayer
        url="/assets/audio/bgm_explore.ogg"
        layer="explore"
        base-volume="0.7"
        loop="1"
      ></MusicLayer>
      <MusicLayer
        url="/assets/audio/bgm_battle.ogg"
        layer="battle"
        base-volume="0.9"
        loop="1"
      ></MusicLayer>

      <!-- 2 km × 2 km terrain — quadtree LOD chunks (levels=4), 2048×2048 heightmap.
           Physics: one Rapier heightfield per visual chunk, built/freed dynamically. -->
      <Terrain
        pos="0 0 0"
        world-size="2000"
        max-height="130"
        levels="4"
        resolution="128"
        lod-hysteresis="1.3"
        lod-distance-ratio="2"
        height-smoothing="0.3"
        height-smoothing-spread="1.25"
        heightmap="/assets/terrain/heightmap.png"
        skirt-width="0.015625"
        roughness="0.78"
        metalness="0"
        normal-strength="1.0"
        base-color="#8cb866"
      ></Terrain>

      <NavMesh></NavMesh>

      <!-- Água gerada dinamicamente a partir de /assets/terrain/terrain.json no bootstrap. -->

      <!-- Fog disabled temporarily -->

      <!-- WaveManager desativado enquanto ajustamos movimento/câmera -->
      <!-- <GameObject name="WaveManager" script="wave-manager.ts"></GameObject> -->

      <!-- Terreno XZ ∈ [-5000,5000] centrado na origem (world size 10000). Colocar o herói no centro da ilha + câmera a olhar para dentro do mapa. -->
      <PlayerGLTF
        name="hero"
        pos="0 50 0"
        model-url="/assets/meshes/hero_rigged_animated.glb"
      >
      </PlayerGLTF>

      <!-- Merchant's hut — one Composition entity (1 entity, 1 Rapier body,
            7 box meshes + compound per-wall colliders). Open doorway at the front
            (+Z): the compound collider leaves the doorway gap walkable while each
            wall still blocks the player. Placed on terrain via SpawnerPlugin. -->
      <Composition
        place="at: 16 8; align-to-terrain: 0; ground-align: none"
        body="fixed"
        collider="auto"
      >
        <Box pos="0 0.1 0" size="6.4 0.2 6.4" color="#6b4a2b"></Box>
        <Box pos="0 1.6 -3" size="6.4 3 0.3" color="#8a5a30"></Box>
        <Box pos="-3 1.6 0" size="0.3 3 6.4" color="#8a5a30"></Box>
        <Box pos="3 1.6 0" size="0.3 3 6.4" color="#8a5a30"></Box>
        <Box pos="-2.3 1.6 3" size="1.8 3 0.3" color="#8a5a30"></Box>
        <Box pos="2.3 1.6 3" size="1.8 3 0.3" color="#8a5a30"></Box>
        <Box pos="0 3.3 0" size="7.2 0.4 7.2" color="#4a2f18"></Box>
        <PointLight
          pos="0 2.6 0"
          point-light="color: 0xffcc77; intensity: 10; distance: 8; decay: 2"
        ></PointLight>
      </Composition>

      <!-- The merchant NPC: engine SpawnerPlugin placement (composition) +
           game-specific shop-flow script. Walk up and press K to trade. -->
      <GameObject
        name="merchant"
        place="at: 16 9; align-to-terrain: 0"
        script="merchant.ts"
      ></GameObject>

      <!-- Treasure chest (model from the project's text3d pipeline). Placed by
           the spawner (avoid-overlaps + clearance) so it lands in a clear spot
           near the merchant instead of glued to the hut. Walk up + press F for
           gold + a heal. Trimesh collider blocks the player. -->
      <DynamicSpawner
        count="1"
        seed="5"
        region-min="-6 0 -18"
        region-max="22 0 2"
        align-to-terrain="true"
        avoid-overlaps="true"
        random-yaw="true"
        max-slope-deg="25"
      >
        <GameObject
          role="dynamic"
          name="chest"
          script="chest.ts"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/treasure_chest_collision.glb; mesh-anchor: base"
        ></GameObject>
      </DynamicSpawner>

      <!-- Mystic readables: pre-generated GLBs from public/assets, each glowing
           emissive until read (F), then granting a one-time reward. Solid
           trimesh colliders so they block the player like the chest. -->
      <GameObject
        name="rune-pillar"
        place="at: -9 7; align-to-terrain: 1"
        rigidbody="type: fixed; mass: 0; gravity-scale: 0"
        collider="shape: trimesh; mesh-url: /assets/meshes/stone_pillar_collision.glb; mesh-anchor: base"
        script="stone-pillar.ts"
      ></GameObject>
      <GameObject
        name="crystal-shrine"
        place="at: 7 -9; align-to-terrain: 1"
        rigidbody="type: fixed; mass: 0; gravity-scale: 0"
        collider="shape: trimesh; mesh-url: /assets/meshes/crystal_blue_collision.glb; mesh-anchor: base"
        script="crystal-shrine.ts"
      ></GameObject>
      <GameObject
        name="glow-mushroom"
        place="at: -6 -5; align-to-terrain: 1"
        rigidbody="type: fixed; mass: 0; gravity-scale: 0"
        collider="shape: trimesh; mesh-url: /assets/meshes/mushroom_red_collision.glb; mesh-anchor: base"
        script="mushroom.ts"
      ></GameObject>

      <!-- Boss ogre — roams the far corner; high HP, heavy melee swings. -->
      <GameObject
        name="boss"
        place="at: -38 -42; align-to-terrain: 0"
        script="boss.ts"
      ></GameObject>

      <!-- Enemies: DynamicSpawner shares the placement core with StaticSpawner
           (region/seed/count/slope/terrain) but spawns one scripted, animated
           entity each — never instanced, since they move. -->
      <DynamicSpawner
        count="5"
        seed="11"
        region-min="-45 0 -34"
        region-max="-14 0 22"
        align-to-terrain="false"
        random-yaw="true"
        avoid-overlaps="false"
        max-slope-deg="40"
      >
        <GameObject role="enemy" script="goblin-wander.ts"></GameObject>
      </DynamicSpawner>

      <DynamicSpawner
        count="5"
        seed="23"
        region-min="22 0 -22"
        region-max="48 0 36"
        align-to-terrain="false"
        random-yaw="true"
        avoid-overlaps="false"
        max-slope-deg="40"
      >
        <GameObject role="enemy" script="slime.ts"></GameObject>
      </DynamicSpawner>

      <!-- ============================================================
           ALDEIA DO VALE — vila ao norte do spawn, construída só com
           itens compostos (Composition): cada casa/poço/torre = 1 entidade,
           1 corpo Rapier, colliders compostos. `place at: X Z` amostra a
           altura do terreno; align-to-terrain:0 mantém de pé.
           Zona x∈[-13,13] z∈[18,47]: livre de inimigos
           (gobelins a oeste, slimes a leste) e dos santuários centrais.
           SpawnExclusion discs impedem árvores/pedras de nascer na vila.
           ============================================================ -->

      <!-- Exclusão de spawn: 3 discos largos cobrem toda a área da vila. -->
      <SpawnExclusion at="0 24" radius="20"></SpawnExclusion>
      <SpawnExclusion at="0 38" radius="20"></SpawnExclusion>
      <SpawnExclusion at="0 48" radius="10"></SpawnExclusion>

      <!-- Palanques de cerca na borda sul da vila (marcador visual). -->
      <Composition place="at: -14 16; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: -8 15; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: 0 15; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: 8 15; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: 14 16; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>

      <!-- Arco de entrada sul da vila com placa. -->
      <Composition place="at: 0 15; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="-3 1.4 0" size="0.18 2.8 0.18" color="#4a3018"></Box>
        <Box pos="3 1.4 0" size="0.18 2.8 0.18" color="#4a3018"></Box>
        <Box pos="0 2.9 0" size="6.4 0.4 0.25" color="#5a3a20"></Box>
        <Box pos="0 2.3 0.1" size="2.8 0.7 0.06" color="#e8ddc8"></Box>
      </Composition>

      <!-- Caminho de terra: do arco sul até a praça do poço. -->
      <Composition place="at: 0 20; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.02 0" size="3 0.05 5" color="#8a7a5a"></Box>
      </Composition>
      <Composition place="at: 0 26; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.02 0" size="3.5 0.05 4" color="#7a6a4a"></Box>
      </Composition>
      <Composition place="at: 0 31; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.02 0" size="4 0.05 4" color="#7a6a4a"></Box>
      </Composition>

      <!-- Vasos de flores junto ao poço. -->
      <Composition place="at: -2.2 34; align-to-terrain: 0" body="fixed" collider="none">
        <Cylinder pos="0 0.3 0" size="0.3 0.3 0.5" color="#8a5a30"></Cylinder>
        <Sphere pos="0 0.7 0" size="0.35" color="#dd5577"></Sphere>
      </Composition>
      <Composition place="at: 2.2 34; align-to-terrain: 0" body="fixed" collider="none">
        <Cylinder pos="0 0.3 0" size="0.3 0.3 0.5" color="#8a5a30"></Cylinder>
        <Sphere pos="0 0.7 0" size="0.35" color="#ffdd44"></Sphere>
      </Composition>

      <!-- Fardos de feno perto da casa do ancião. -->
      <Composition place="at: 6 42; align-to-terrain: 0" body="fixed" collider="auto">
        <Cylinder pos="0 0.5 0" size="0.9 0.9 1.0" rotation="1.5708 0 0" color="#d4b85a"></Cylinder>
      </Composition>
      <Composition place="at: -6 42; align-to-terrain: 0" body="fixed" collider="auto">
        <Cylinder pos="0 0.5 0" size="0.8 0.8 0.9" rotation="1.5708 0 0" color="#cda84e"></Cylinder>
      </Composition>

      <!-- Palanques laterais (oeste). -->
      <Composition place="at: -15 22; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: -15 30; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: -15 38; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>

      <!-- Palanques laterais (leste). -->
      <Composition place="at: 15 22; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: 15 30; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: 15 38; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.8 0" size="0.14 1.6 0.14" color="#4a3018"></Box>
      </Composition>

      <!-- Barris perto das bancas de mercado. -->
      <Composition place="at: -7 35; align-to-terrain: 0" body="fixed" collider="auto">
        <Cylinder pos="0 0.55 0" size="0.4 0.4 0.8" color="#6b4a2b"></Cylinder>
        <Cylinder pos="0.5 0.5 0.3" size="0.35 0.35 0.7" color="#5a3a20"></Cylinder>
      </Composition>
      <Composition place="at: 7 35; align-to-terrain: 0" body="fixed" collider="auto">
        <Cylinder pos="0 0.55 0" size="0.4 0.4 0.8" color="#6b4a2b"></Cylinder>
      </Composition>

      <!-- Poço central da praça: anel de pedra + água + telhadinho de balde. -->
      <Composition place="at: 0 34; align-to-terrain: 0" body="fixed" collider="auto">
        <Cylinder pos="0 0.45 0" size="1.3 1.3 0.9" color="#9a958c"></Cylinder>
        <Cylinder pos="0 0.55 0" size="1.0 1.0 0.1" color="#2f6fb0"></Cylinder>
        <Box pos="-1.15 1.0 0" size="0.16 1.7 0.16" color="#5a3a20"></Box>
        <Box pos="1.15 1.0 0" size="0.16 1.7 0.16" color="#5a3a20"></Box>
        <Box pos="0 1.85 0" size="2.6 0.12 0.12" color="#4a2f18"></Box>
        <Box pos="-0.95 2.05 0" size="1.4 0.14 1.0" rotation="0 0 0.6" color="#7a3b28"></Box>
        <Box pos="0.95 2.05 0" size="1.4 0.14 1.0" rotation="0 0 -0.6" color="#7a3b28"></Box>
        <Box pos="0 1.4 0" size="0.5 0.4 0.5" color="#6b4a2b"></Box>
      </Composition>

      <!-- Fogueira da praça: rodela de pedras + lenha cruzada + chama + luz quente. -->
      <Composition place="at: 0 26; align-to-terrain: 0" body="fixed" collider="none">
        <Cylinder pos="0 0.12 0" size="1.0 1.15 0.25" color="#6f6a63"></Cylinder>
        <Cylinder pos="0 0.35 0" size="0.12 0.12 1.5" rotation="1.5 0 0.2" color="#5a3a20"></Cylinder>
        <Cylinder pos="0 0.35 0" size="0.12 0.12 1.5" rotation="1.5 1.0 -0.2" color="#6b4a2b"></Cylinder>
        <Cylinder pos="0 0.35 0" size="0.12 0.12 1.5" rotation="1.5 2.0 0.1" color="#5a3a20"></Cylinder>
        <Sphere pos="0 0.7 0" size="0.55" color="#ff7722"></Sphere>
        <Sphere pos="0 1.05 0" size="0.32" color="#ffcc33"></Sphere>
        <PointLight pos="0 1.1 0" point-light="color: 0xff8a33; intensity: 14; distance: 16; decay: 2"></PointLight>
      </Composition>

      <!-- Casa A (oeste-sul): paredes de reboco, porta no +Z, telhado de duas águas, chaminé + lareira. -->
      <Composition place="at: -10 28; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="5 0.2 5" color="#6b4a2b"></Box>
        <Box pos="0 1.4 -2.4" size="5 2.6 0.3" color="#d8c7a0"></Box>
        <Box pos="-2.4 1.4 0" size="0.3 2.6 5" color="#cdb88f"></Box>
        <Box pos="2.4 1.4 0" size="0.3 2.6 5" color="#cdb88f"></Box>
        <Box pos="-1.7 1.4 2.4" size="1.6 2.6 0.3" color="#d8c7a0"></Box>
        <Box pos="1.7 1.4 2.4" size="1.6 2.6 0.3" color="#d8c7a0"></Box>
        <Box pos="0 2.5 2.4" size="1.8 0.4 0.3" color="#8a5a30"></Box>
        <Box pos="-0.9 1.2 2.45" size="0.12 2.4 0.12" color="#5a3a20"></Box>
        <Box pos="0.9 1.2 2.45" size="0.12 2.4 0.12" color="#5a3a20"></Box>
        <Box pos="-1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 0.62" color="#7a3b28"></Box>
        <Box pos="1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 -0.62" color="#7a3b28"></Box>
        <Box pos="1.6 3.5 -1.3" size="0.5 1.5 0.5" color="#8a8a8a"></Box>
        <Box pos="-2.43 1.5 -1.0" size="0.05 0.8 0.8" color="#3a2a18"></Box>
        <PointLight pos="0 1.5 -0.5" point-light="color: 0xffcc88; intensity: 5; distance: 6; decay: 2"></PointLight>
      </Composition>

      <!-- Casa B (leste-sul): variação de cor/altura, sem lareira (luz fica no budget). -->
      <Composition place="at: 10 28; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="4.4 0.2 4.4" color="#6b4a2b"></Box>
        <Box pos="0 1.3 -2.1" size="4.4 2.4 0.3" color="#c9b48a"></Box>
        <Box pos="-2.1 1.3 0" size="0.3 2.4 4.4" color="#bfa97e"></Box>
        <Box pos="2.1 1.3 0" size="0.3 2.4 4.4" color="#bfa97e"></Box>
        <Box pos="-1.5 1.3 2.1" size="1.4 2.4 0.3" color="#c9b48a"></Box>
        <Box pos="1.5 1.3 2.1" size="1.4 2.4 0.3" color="#c9b48a"></Box>
        <Box pos="0 2.3 2.1" size="1.6 0.4 0.3" color="#8a5a30"></Box>
        <Box pos="-1.15 2.8 0" size="2.8 0.2 4.8" rotation="0 0 0.6" color="#6e4b2a"></Box>
        <Box pos="1.15 2.8 0" size="2.8 0.2 4.8" rotation="0 0 -0.6" color="#6e4b2a"></Box>
        <Box pos="-2.13 1.4 1.0" size="0.05 0.7 0.7" color="#3a2a18"></Box>
      </Composition>

      <!-- Casa C (oeste-norte): mesma planta, paleta fria, lareira acesa. -->
      <Composition place="at: -11 41; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="5 0.2 5" color="#6b4a2b"></Box>
        <Box pos="0 1.4 -2.4" size="5 2.6 0.3" color="#cfc3b0"></Box>
        <Box pos="-2.4 1.4 0" size="0.3 2.6 5" color="#c4b8a4"></Box>
        <Box pos="2.4 1.4 0" size="0.3 2.6 5" color="#c4b8a4"></Box>
        <Box pos="-1.7 1.4 2.4" size="1.6 2.6 0.3" color="#cfc3b0"></Box>
        <Box pos="1.7 1.4 2.4" size="1.6 2.6 0.3" color="#cfc3b0"></Box>
        <Box pos="0 2.5 2.4" size="1.8 0.4 0.3" color="#7a5230"></Box>
        <Box pos="-0.9 1.2 2.45" size="0.12 2.4 0.12" color="#5a3a20"></Box>
        <Box pos="0.9 1.2 2.45" size="0.12 2.4 0.12" color="#5a3a20"></Box>
        <Box pos="-1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 0.62" color="#55402a"></Box>
        <Box pos="1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 -0.62" color="#55402a"></Box>
        <Box pos="-1.6 3.5 -1.3" size="0.5 1.5 0.5" color="#8a8a8a"></Box>
        <PointLight pos="0 1.5 -0.5" point-light="color: 0xffc070; intensity: 5; distance: 6; decay: 2"></PointLight>
      </Composition>

      <!-- Casa D (leste-norte): casa longa (longhouse) do ancião — maior, telhado alto. -->
      <Composition place="at: 11 41; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="7 0.2 5" color="#6b4a2b"></Box>
        <Box pos="0 1.6 -2.4" size="7 3.0 0.3" color="#d2c1a0"></Box>
        <Box pos="-3.4 1.6 0" size="0.3 3.0 5" color="#c8b896"></Box>
        <Box pos="3.4 1.6 0" size="0.3 3.0 5" color="#c8b896"></Box>
        <Box pos="-2.7 1.6 2.4" size="1.5 3.0 0.3" color="#d2c1a0"></Box>
        <Box pos="2.7 1.6 2.4" size="1.5 3.0 0.3" color="#d2c1a0"></Box>
        <Box pos="0 1.6 2.4" size="2.5 3.0 0.3" color="#d2c1a0"></Box>
        <Box pos="-1.9 3.4 0" size="4.0 0.22 5.4" rotation="0 0 0.6" color="#7a3b28"></Box>
        <Box pos="1.9 3.4 0" size="4.0 0.22 5.4" rotation="0 0 -0.6" color="#7a3b28"></Box>
        <Box pos="0 4.35 0" size="0.5 0.5 5.4" color="#5a3a20"></Box>
        <Box pos="-2.5 1.0 2.55" size="0.12 2.0 0.12" color="#5a3a20"></Box>
        <Box pos="-1.3 1.0 2.55" size="0.12 2.0 0.12" color="#5a3a20"></Box>
      </Composition>

      <!-- Banca de mercado 1 (frutas): postes + balcão + toldo listrado + caixotes/maçãs. -->
      <Composition place="at: -3.5 30; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="-1.1 0.85 -0.7" size="0.1 1.7 0.1" color="#5a3a20"></Box>
        <Box pos="1.1 0.85 -0.7" size="0.1 1.7 0.1" color="#5a3a20"></Box>
        <Box pos="-1.1 0.5 0.7" size="0.1 1.0 0.1" color="#5a3a20"></Box>
        <Box pos="1.1 0.5 0.7" size="0.1 1.0 0.1" color="#5a3a20"></Box>
        <Box pos="0 1.0 0" size="2.4 0.15 1.6" color="#8a5a30"></Box>
        <Box pos="-0.6 1.7 0" size="1.2 0.08 1.8" rotation="0.25 0 0" color="#b03b3b"></Box>
        <Box pos="0.6 1.7 0" size="1.2 0.08 1.8" rotation="0.25 0 0" color="#e8ddc8"></Box>

        <Sphere pos="0.55 1.18 -0.2" size="0.16" color="#88aa33"></Sphere>
      </Composition>

      <!-- Banca de mercado 2 (peixe/tecidos): variação azul. -->
      <Composition place="at: 3.5 30; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="-1.1 0.85 -0.7" size="0.1 1.7 0.1" color="#5a3a20"></Box>
        <Box pos="1.1 0.85 -0.7" size="0.1 1.7 0.1" color="#5a3a20"></Box>
        <Box pos="-1.1 0.5 0.7" size="0.1 1.0 0.1" color="#5a3a20"></Box>
        <Box pos="1.1 0.5 0.7" size="0.1 1.0 0.1" color="#5a3a20"></Box>
        <Box pos="0 1.0 0" size="2.4 0.15 1.6" color="#8a5a30"></Box>
        <Box pos="-0.6 1.7 0" size="1.2 0.08 1.8" rotation="0.25 0 0" color="#2f6fb0"></Box>
        <Box pos="0.6 1.7 0" size="1.2 0.08 1.8" rotation="0.25 0 0" color="#e8ddc8"></Box>
        <Box pos="0.4 1.2 0" size="1.2 0.4 0.7" color="#b8b0a0"></Box>
        <Box pos="-0.6 1.18 0.1" size="0.5 0.3 0.6" color="#7a5230"></Box>
      </Composition>

      <!-- Torre de vigia ao norte: base de pedra, plataforma com guarda-corpo, telhado cônico, farol. -->
      <Composition place="at: 0 47; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 2.1 0" size="3 4.2 3" color="#8f8a80"></Box>
        <Box pos="0 4.4 0" size="3.8 0.3 3.8" color="#6b4a2b"></Box>
        <Box pos="0 4.9 -1.8" size="3.8 1.0 0.15" color="#7a5230"></Box>
        <Box pos="0 4.9 1.8" size="3.8 1.0 0.15" color="#7a5230"></Box>
        <Box pos="-1.8 4.9 0" size="0.15 1.0 3.8" color="#7a5230"></Box>
        <Box pos="1.8 4.9 0" size="0.15 1.0 3.8" color="#7a5230"></Box>
        <Cylinder pos="0 6.2 0" size="0.05 2.0 1.8" color="#7a3b28"></Cylinder>
        <Sphere pos="0 5.6 0" size="0.3" color="#ffd27a"></Sphere>
        <PointLight pos="0 5.6 0" point-light="color: 0xffd27a; intensity: 12; distance: 22; decay: 2"></PointLight>
        <Box pos="0 0.6 1.55" size="0.9 1.2 0.1" color="#3a2a18"></Box>
      </Composition>

      <!-- Quadro de avisos da vila (perto da praça). -->
      <Composition place="at: 3 27; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="-0.7 0.7 0" size="0.12 1.4 0.12" color="#5a3a20"></Box>
        <Box pos="0.7 0.7 0" size="0.12 1.4 0.12" color="#5a3a20"></Box>
        <Box pos="0 1.35 0" size="1.8 1.0 0.1" color="#7a5230"></Box>
        <Box pos="0 1.55 0.06" size="1.5 0.5 0.04" color="#e8ddc8"></Box>
        <Box pos="0 1.9 0" size="2.0 0.2 0.3" rotation="0 0 0" color="#55402a"></Box>
      </Composition>

      <!-- Tochas de caminho: do spawn (z~18) até a praça, mais cantos da praça.
           Só chama + luz; sem collider, o jogador passa livre. -->
      <Composition place="at: 0 18; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.9 0" size="0.1 1.8 0.1" color="#5a3a20"></Box>
        <Cylinder pos="0 1.85 0" size="0.22 0.12 0.2" color="#444444"></Cylinder>
        <Sphere pos="0 2.0 0" size="0.18" color="#ffaa33"></Sphere>
        <PointLight pos="0 2.05 0" point-light="color: 0xffa83a; intensity: 6; distance: 9; decay: 2"></PointLight>
      </Composition>
      <Composition place="at: -3 26; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.9 0" size="0.1 1.8 0.1" color="#5a3a20"></Box>
        <Cylinder pos="0 1.85 0" size="0.22 0.12 0.2" color="#444444"></Cylinder>
        <Sphere pos="0 2.0 0" size="0.18" color="#ffaa33"></Sphere>
        <PointLight pos="0 2.05 0" point-light="color: 0xffa83a; intensity: 6; distance: 9; decay: 2"></PointLight>
      </Composition>
      <Composition place="at: 3 26; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.9 0" size="0.1 1.8 0.1" color="#5a3a20"></Box>
        <Cylinder pos="0 1.85 0" size="0.22 0.12 0.2" color="#444444"></Cylinder>
        <Sphere pos="0 2.0 0" size="0.18" color="#ffaa33"></Sphere>
        <PointLight pos="0 2.05 0" point-light="color: 0xffa83a; intensity: 6; distance: 9; decay: 2"></PointLight>
      </Composition>
      <Composition place="at: -7 34; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.9 0" size="0.1 1.8 0.1" color="#5a3a20"></Box>
        <Cylinder pos="0 1.85 0" size="0.22 0.12 0.2" color="#444444"></Cylinder>
        <Sphere pos="0 2.0 0" size="0.18" color="#ffaa33"></Sphere>
        <PointLight pos="0 2.05 0" point-light="color: 0xffa83a; intensity: 6; distance: 9; decay: 2"></PointLight>
      </Composition>
      <Composition place="at: 7 34; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.9 0" size="0.1 1.8 0.1" color="#5a3a20"></Box>
        <Cylinder pos="0 1.85 0" size="0.22 0.12 0.2" color="#444444"></Cylinder>
        <Sphere pos="0 2.0 0" size="0.18" color="#ffaa33"></Sphere>
        <PointLight pos="0 2.05 0" point-light="color: 0xffa83a; intensity: 6; distance: 9; decay: 2"></PointLight>
      </Composition>

      <!-- Harvestable rocks (stone). StaticSpawner auto-routes the visual through
            the instanced pool; the trimesh collider feeds the navmesh. The
            ResourceNode (T11) tags the yield kind/amount. -->
      <StaticSpawner
        profile="tree"
        count="30"
        seed="99"
        region-min="-55 0 -55"
        region-max="55 0 55"
        align-to-terrain="0"
        ground-align="none"
        scale-min="0.8"
        scale-max="1.5"
        avoid-overlaps="1"
      >
        <GameObject
          role="static"
          script="rock.ts"
          destructible="popup-text: Stone; popup-color: #cccccc; preset: explosion; hits: 3; spark-on-hit: 1"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/rock_mossy_collision.glb; mesh-anchor: base"
        >
          <GLTFLoader
            role="visual"
            url="/assets/meshes/rock_mossy_lod0.glb"
          ></GLTFLoader>
          <ResourceNode
            kind="stone"
            yield="3"
            transform="pos: 0 0 0"
          ></ResourceNode>
        </GameObject>
      </StaticSpawner>

      <!-- Harvestable oak trees (wood). Same single instancing path, with LOD.
            ResourceNode (T11) declares the wood yield. -->
      <StaticSpawner
        profile="tree"
        count="60"
        seed="7"
        region-min="-110 0 -110"
        region-max="110 0 110"
        align-to-terrain="0"
        ground-align="none"
        scale-min="1.4"
        scale-max="2.6"
        avoid-overlaps="1"
      >
        <GameObject
          role="static"
          destructible="popup-text: Wood; popup-color: #8b4513; preset: dust; hits: 3; spark-on-hit: 1"
          script="tree.ts"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/tree_oak_collision.glb; mesh-anchor: base"
        >
          <GLTFLoader
            role="visual"
            url="/assets/meshes/tree_oak_lod0.glb"
            lod1-url="/assets/meshes/tree_oak_lod1.glb"
            lod2-url="/assets/meshes/tree_oak_lod2.glb"
          ></GLTFLoader>
          <ResourceNode
            kind="wood"
            yield="3"
            transform="pos: 0 0 0"
          ></ResourceNode>
        </GameObject>
      </StaticSpawner>

      <!-- Post-processing: bloom + vignette + SMAA + AGX tonemap + SSAO (moderate). CA off. Keys 1-6 toggle at runtime. -->
      <ThirdPersonCamera
        distance="4"
        height="1.6"
        pitch="0.28"
        follow-lag="0.18"
        turn-lag="0.38"
        mouse-sensitivity="0.003"
      ></ThirdPersonCamera>

      <!-- SpawnGroups disabled for perf testing -->

      <PostFxDebugToggle></PostFxDebugToggle>

      <!-- HUD: declarative screen-space layer + widgets (engine HudPlugin,
           T20–T27). Bars/chips target the hero entity by name. -->
      <HudScreenLayer></HudScreenLayer>
      <HealthBar target-entity="hero" icon="❤"></HealthBar>
      <XpBar target-entity="hero"></XpBar>
      <ResourceChip
        resource="gold"
        icon="🪙"
        target-entity="hero"
      ></ResourceChip>
      <ResourceChip
        resource="wood"
        icon="🪵"
        target-entity="hero"
      ></ResourceChip>
      <ResourceChip
        resource="stone"
        icon="🪨"
        target-entity="hero"
      ></ResourceChip>
      <Minimap range="60"></Minimap>
      <Compass></Compass>
      <BossBar target-entity="boss"></BossBar>
      <InteractionPrompt
        key="F"
        range="4.5"
        position="bottom-center"
      ></InteractionPrompt>

      <!-- Pause menu: tabbed modal (Escape) with skills / inventory / options
           tabs (engine HudPlugin, T27). -->
      <TabbedModal
        id="pause"
        key="Escape"
        target-entity="hero"
        title-key="modal.pause"
      >
        <SkillsTab></SkillsTab>
        <InventoryTab columns="5"></InventoryTab>
        <OptionsTab>
          <OptionRow
            id="music-volume"
            type="slider"
            label-key="options.music"
            min="0"
            max="100"
            step="5"
            default="70"
          ></OptionRow>
          <OptionRow
            id="sfx-volume"
            type="slider"
            label-key="options.sfx"
            min="0"
            max="100"
            step="5"
            default="80"
          ></OptionRow>
        </OptionsTab>
      </TabbedModal>
    </Scene>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
