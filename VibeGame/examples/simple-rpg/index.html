<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Simples — Vale do Cristal (VibeGame)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        transform-origin: center center;
        will-change: transform;
      }
    </style>
  </head>

  <body>
    <Scene
      canvas="#game-canvas"
      sky="#ffffff"
      resume-audio-on-user-gesture="true"
    >
      <EquirectSky url="/assets/sky/sky.png"></EquirectSky>

      <!-- Fill + sol: mais fill no hemisfério + sol um pouco mais alto = sombras mais curtas e terreno menos “enterrado”. -->
      <GameObject
        ambient-light="sky-color: 0xfff8f0; ground-color: 0xe0d0a8; intensity: 1.8"
        directional-light="color: 0xfff0d0; intensity: 3.0; direction-x: -0.7; direction-y: 3.5; direction-z: -0.6; cast-shadow: 1; shadow-map-size: 2048; distance: 120"
          postprocessing="enabled: 1; bloom: 1; bloom-strength: 0.55; bloom-radius: 0.6; bloom-threshold: 0.6; chromatic-aberration: 0; ca-strength: 0; vignette: 1; vignette-offset: 0.22; vignette-darkness: 0.62; aa: smaa; tone-mapping: agx; tone-mapping-exposure: 1.05; ssao: 1; ssao-intensity: 0.55; ssao-radius: 0.9"
      >
      </GameObject>

      <AudioSource
        name="bgm"
        url="/assets/audio/bgm_field.wav"
        loop="true"
        volume="0.18"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-jump"
        url="/assets/audio/sfx_jump.wav"
        loop="false"
        volume="0.42"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-save"
        url="/assets/audio/sfx_save.wav"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-load"
        url="/assets/audio/sfx_load.wav"
        loop="false"
        volume="0.44"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-heal"
        url="/assets/audio/sfx_heal.ogg"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-hit"
        url="/assets/audio/sfx_hit.ogg"
        loop="false"
        volume="0.45"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-enemy-hurt"
        url="/assets/audio/sfx_enemy_hurt.ogg"
        loop="false"
        volume="0.42"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-enemy-death"
        url="/assets/audio/sfx_enemy_death.ogg"
        loop="false"
        volume="0.5"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-boss-roar"
        url="/assets/audio/sfx_boss_roar.ogg"
        loop="false"
        volume="0.55"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-shop-open"
        url="/assets/audio/sfx_shop_open.ogg"
        loop="false"
        volume="0.45"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-buy"
        url="/assets/audio/sfx_buy.ogg"
        loop="false"
        volume="0.45"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-error"
        url="/assets/audio/sfx_error.ogg"
        loop="false"
        volume="0.4"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-player-hurt"
        url="/assets/audio/sfx_player_hurt.ogg"
        loop="false"
        volume="0.5"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-coin"
        url="/assets/audio/sfx_coin.ogg"
        loop="false"
        volume="0.42"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-item-drop"
        url="/assets/audio/sfx_item_drop.ogg"
        loop="false"
        volume="0.4"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="bgm-battle"
        url="/assets/audio/bgm_battle.ogg"
        loop="true"
        volume="0.22"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="bgm-explore"
        url="/assets/audio/bgm_explore.ogg"
        loop="true"
        volume="0.18"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-mine-hit"
        url="/assets/audio/sfx_mine_hit.ogg"
        loop="false"
        volume="0.45"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-chop-hit"
        url="/assets/audio/sfx_chop_hit.ogg"
        loop="false"
        volume="0.45"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-mine-break"
        url="/assets/audio/sfx_mine_break.ogg"
        loop="false"
        volume="0.5"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-chop-break"
        url="/assets/audio/sfx_chop_break.ogg"
        loop="false"
        volume="0.5"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-levelup"
        url="/assets/audio/sfx_levelup.ogg"
        loop="false"
        volume="0.55"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-swing"
        url="/assets/audio/sfx_swing.ogg"
        loop="false"
        volume="0.3"
        playing="false"
        spatial="false"
      ></AudioSource>

      <!-- 2 km × 2 km terrain — quadtree LOD chunks (levels=4), 2048×2048 heightmap.
           Physics: one Rapier heightfield per visual chunk, built/freed dynamically. -->
      <Terrain
        pos="0 0 0"
        world-size="2000"
        max-height="130"
        levels="4"
        resolution="128"
        lod-hysteresis="1.3"
        lod-distance-ratio="2"
        height-smoothing="0.3"
        height-smoothing-spread="1.25"
        heightmap="/assets/terrain/heightmap.png"
        skirt-width="0.015625"
        roughness="0.78"
        metalness="0"
        normal-strength="1.0"
        base-color="#8cb866"
      ></Terrain>

      <NavMesh></NavMesh>

      <!-- Água gerada dinamicamente a partir de /assets/terrain/terrain.json no bootstrap. -->

      <!-- Fog disabled temporarily -->

      <!-- WaveManager desativado enquanto ajustamos movimento/câmera -->
      <!-- <GameObject name="WaveManager" script="wave-manager.ts"></GameObject> -->

      <!-- Terreno XZ ∈ [-5000,5000] centrado na origem (world-size 10000). Colocar o herói no centro da ilha + câmera a olhar para dentro do mapa. -->
      <PlayerGLTF
        name="hero"
        pos="0 50 0"
        model-url="/assets/meshes/hero_rigged_animated.glb"
      >
      </PlayerGLTF>

      <!-- 100 decorative oak trees. StaticSpawner = one shared instanced-mesh
           pool (per LOD), one draw call per primitive for the whole set. Each is
           a real entity with a fixed trunk trimesh collider, so the player
           collides and the navmesh (built from colliders) makes AI path around. -->
      <StaticSpawner
        profile="tree"
        count="100"
        seed="42"
        region-min="-200 0 -200"
        region-max="200 0 200"
        scale-min="2"
        scale-max="3.5"
        yaw-distribution="discrete"
        yaw-step-deg="45"
      >
        <GameObject
          role="static"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/tree_oak_collision.glb; mesh-anchor: base"
        >
          <GLTFLoader
            role="visual"
            url="/assets/meshes/tree_oak_lod0.glb"
            lod1-url="/assets/meshes/tree_oak_lod1.glb"
            lod2-url="/assets/meshes/tree_oak_lod2.glb"
          ></GLTFLoader>
        </GameObject>
      </StaticSpawner>

      <!-- Merchant's hut — one Composition entity (1 entity, 1 Rapier body,
           7 box meshes + compound per-wall colliders). Open doorway at the front
           (+Z): the compound collider leaves the doorway gap walkable while each
           wall still blocks the player. Placed on terrain via SpawnerPlugin. -->
      <Composition
        place="at: 16 8; align-to-terrain: 0; ground-align: none"
        body="fixed"
        collider="auto"
      >
        <Box pos="0 0.1 0"    size="6.4 0.2 6.4" color="#6b4a2b"></Box>
        <Box pos="0 1.6 -3"   size="6.4 3 0.3"   color="#8a5a30"></Box>
        <Box pos="-3 1.6 0"   size="0.3 3 6.4"   color="#8a5a30"></Box>
        <Box pos="3 1.6 0"    size="0.3 3 6.4"   color="#8a5a30"></Box>
        <Box pos="-2.3 1.6 3" size="1.8 3 0.3"   color="#8a5a30"></Box>
        <Box pos="2.3 1.6 3"  size="1.8 3 0.3"   color="#8a5a30"></Box>
        <Box pos="0 3.3 0"    size="7.2 0.4 7.2" color="#4a2f18"></Box>
        <PointLight
          pos="0 2.6 0"
          point-light="color: 0xffcc77; intensity: 10; distance: 8; decay: 2"
        ></PointLight>
      </Composition>

      <!-- The merchant NPC stands inside the hut; walk up and press F to talk.
           The script loads the rigged GLB itself and plays the idle clip. -->
      <GameObject
        name="merchant"
        place="at: 16 9; align-to-terrain: 0"
        script="merchant.ts"
      ></GameObject>

      <!-- Boss ogre — roams the far corner; high HP, heavy melee swings. -->
      <GameObject
        name="boss"
        place="at: -120 -120; align-to-terrain: 0"
        script="boss.ts"
      ></GameObject>

      <!-- Enemies: DynamicSpawner shares the placement core with StaticSpawner
           (region/seed/count/slope/terrain) but spawns one scripted, animated
           entity each — never instanced, since they move. -->
      <DynamicSpawner
        count="5"
        seed="11"
        region-min="-45 0 -34"
        region-max="-14 0 22"
        align-to-terrain="false"
        random-yaw="true"
        avoid-overlaps="false"
        max-slope-deg="40"
      >
        <GameObject role="enemy" script="goblin-wander.ts"></GameObject>
      </DynamicSpawner>

      <DynamicSpawner
        count="5"
        seed="23"
        region-min="22 0 -22"
        region-max="48 0 36"
        align-to-terrain="false"
        random-yaw="true"
        avoid-overlaps="false"
        max-slope-deg="40"
      >
        <GameObject role="enemy" script="slime.ts"></GameObject>
      </DynamicSpawner>

      <!-- Harvestable rocks (stone). StaticSpawner auto-routes the visual through
           the instanced pool; the trimesh collider feeds the navmesh. -->
      <StaticSpawner
        profile="tree"
        count="10"
        seed="99"
        region-min="-30 0 -30"
        region-max="30 0 30"
        align-to-terrain="0"
        ground-align="none"
        scale-min="0.8"
        scale-max="1.5"
      >
        <GameObject
          role="static"
          destructible="popup-text: Stone; popup-color: #cccccc; preset: explosion; hits: 3; spark-on-hit: 1"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/rock_mossy_collision.glb; mesh-anchor: base"
        >
          <GLTFLoader
            role="visual"
            url="/assets/meshes/rock_mossy_lod0.glb"
          ></GLTFLoader>
        </GameObject>
      </StaticSpawner>

      <!-- Harvestable oak trees (wood). Same single instancing path, with LOD. -->
      <StaticSpawner
        profile="tree"
        count="14"
        seed="7"
        region-min="-60 0 -60"
        region-max="60 0 60"
        align-to-terrain="0"
        ground-align="none"
        scale-min="1.4"
        scale-max="2.6"
      >
        <GameObject
          role="static"
          destructible="popup-text: Wood; popup-color: #8b4513; preset: dust; hits: 3; spark-on-hit: 1"
          script="tree.ts"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/tree_oak_collision.glb; mesh-anchor: base"
        >
          <GLTFLoader
            role="visual"
            url="/assets/meshes/tree_oak_lod0.glb"
            lod1-url="/assets/meshes/tree_oak_lod1.glb"
            lod2-url="/assets/meshes/tree_oak_lod2.glb"
          ></GLTFLoader>
        </GameObject>
      </StaticSpawner>


      <!-- Post-processing: bloom + vignette + SMAA + AGX tonemap + SSAO (moderate). CA off. Keys 1-6 toggle at runtime. -->
      <ThirdPersonCamera
        distance="4"
        height="1.6"
        pitch="0.28"
        follow-lag="0.18"
        turn-lag="0.38"
        mouse-sensitivity="0.003"
      ></ThirdPersonCamera>

      <!-- SpawnGroups disabled for perf testing -->
    </Scene>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
