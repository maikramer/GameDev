<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Simples — Vale do Cristal (VibeGame)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        transform-origin: center center;
        will-change: transform;
      }

      #controls-hint {
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        padding: 4px 14px;
        background: rgba(20, 15, 10, 0.55);
        border: 1px solid rgba(200, 160, 74, 0.35);
        border-radius: 4px;
        color: #e8d8b0;
        font: 12px Georgia, serif;
        letter-spacing: 0.5px;
        pointer-events: none;
        z-index: 50;
        white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <!-- ================================================================
         MAPA — CIDADE CENTRAL MURADA + 4 BIOMAS CARDEAIS
         ----------------------------------------------------------------
         A cidade (vale) fica no centro, dentro de uma muralha quadrada
         (semi-extensão 22) com 4 portões cardeais. Cada portão leva a um
         bioma distinto:
           NORTE (+Z) → FLORESTA SOMBRIA   (pinheiros, lobos, sombras, bruxa)
           LESTE (+X) → DESERTO            (cactos, escorpiões, bandidos, verme)
           SUL   (-Z) → PÂNTANO            (salgueiros, boglings, mosquitos, warden)
           OESTE (-X) → PICOS GELADOS       (rochedos, goblins, slimes, ogro)
         Os <BiomeRegion> são cunhas (triângulos/trapézios) que ladrilham o
         espaço fora do quadrado central (semi-lado 28), partidas pelas
         diagonais — sem sobreposição e deixando a cidade como vale neutro.
         ================================================================ -->
    <Scene
      canvas="#game-canvas"
      sky="#ffffff"
      resume-audio-on-user-gesture="true"
    >
      <EquirectSky url="/assets/sky/sky.png"></EquirectSky>

      <!-- Fill + sol: mais fill no hemisfério + sol um pouco mais alto = sombras mais curtas e terreno menos “enterrado”. -->
      <GameObject
        ambient-light="sky-color: 0xfff8f0; ground-color: 0xe0d0a8; intensity: 1.8"
        directional-light="color: 0xfff0d0; intensity: 3.0; direction-x: -0.7; direction-y: 3.5; direction-z: -0.6; cast-shadow: 1; shadow-map-size: 2048; distance: 120"
        postprocessing="enabled: 1; bloom: 1; bloom-strength: 0.55; bloom-radius: 0.6; bloom-threshold: 0.6; chromatic-aberration: 0; ca-strength: 0; vignette: 1; vignette-offset: 0.22; vignette-darkness: 0.62; aa: smaa; tone-mapping: agx; tone-mapping-exposure: 1.05; ssao: 1; ssao-intensity: 0.55; ssao-radius: 0.9; height-fog: 1; fog-color: 0xcfd8e0; fog-density: 0.006"
      >
      </GameObject>

      <!-- Audio mixer tiers + layered music (engine AudioPlugin, T28).
           Explore layer plays by default; biomas fazem crossfade para a sua
           camada via bgm-layer. -->
      <AudioMixer master="1" music="0.7" sfx="0.8"></AudioMixer>
      <MusicLayer
        url="/assets/audio/bgm_explore.ogg"
        layer="explore"
        base-volume="0.7"
        loop="1"
      ></MusicLayer>
      <MusicLayer
        url="/assets/audio/bgm_battle.ogg"
        layer="battle"
        base-volume="0.9"
        loop="1"
      ></MusicLayer>

      <!-- ============================================================
           BIOMAS — 4 cunhas cardeais (spec §8). O BiomeDetectionSystem
           aplica tint/fog/ambient/textura-de-terreno e crossfade de BGM
           quando o herói entra. type: 1=FLORESTA, 2=DESERTO, 3=PÂNTANO,
           4=MONTANHA. As cunhas começam fora do quadrado central (±28) e
           são partidas pelas diagonais (±240 nos cantos).
           ============================================================ -->
      <!-- NORTE: Floresta Sombria -->
      <BiomeRegion
        id="dark-forest"
        type="1"
        polygon="[-28,28;28,28;240,240;-240,240]"
        tint="#1a3320"
        fog-color="#0d1c14"
        fog-density="0.05"
        ambient="#3a4a55"
        bgm-layer="2"
        terrain-texture="/assets/textures/forest_floor.png"
      ></BiomeRegion>
      <!-- LESTE: Deserto -->
      <BiomeRegion
        id="desert"
        type="2"
        polygon="[28,-28;28,28;240,240;240,-240]"
        tint="#c2a878"
        fog-color="#d8c89a"
        fog-density="0.015"
        ambient="#5a4a3a"
        bgm-layer="3"
        terrain-texture="/assets/textures/desert_sand.png"
      ></BiomeRegion>
      <!-- SUL: Pântano -->
      <BiomeRegion
        id="swamp"
        type="3"
        polygon="[-28,-28;28,-28;240,-240;-240,-240]"
        tint="#3a4a30"
        fog-color="#16241a"
        fog-density="0.07"
        ambient="#2a3a30"
        bgm-layer="4"
        terrain-texture="/assets/textures/swamp_mud.png"
      ></BiomeRegion>
      <!-- OESTE: Picos Gelados -->
      <BiomeRegion
        id="frozen-peaks"
        type="4"
        polygon="[-28,-28;-28,28;-240,240;-240,-240]"
        tint="#cdd9e6"
        fog-color="#dfe8f2"
        fog-density="0.045"
        ambient="#aeb9c8"
        bgm-layer="2"
        terrain-texture="/assets/textures/snow_peak.png"
      ></BiomeRegion>

      <!-- Terreno — quadtree LOD chunks. world-size/max-height batem com
           public/assets/terrain/terrain.json. Física: uma heightfield Rapier
           por chunk visual, criada/libertada dinamicamente. -->
      <Terrain
        pos="0 0 0"
        world-size="2000"
        max-height="200"
        levels="4"
        resolution="128"
        lod-hysteresis="1.3"
        lod-distance-ratio="2"
        height-smoothing="0.3"
        height-smoothing-spread="1.25"
        heightmap="/assets/terrain/heightmap.png"
        skirt-width="0.015625"
        roughness="0.78"
        metalness="0"
        normal-strength="1.0"
        base-color="#8cb866"
        texture="/assets/textures/vale_grass.png"
      ></Terrain>

      <NavMesh></NavMesh>

      <!-- Herói no centro da praça da cidade. -->
      <PlayerGLTF
        name="hero"
        pos="0 40 0"
        model-url="/assets/meshes/hero_rigged_animated.glb"
      >
      </PlayerGLTF>

      <!-- ============================================================
           CIDADE CENTRAL (VALE) — dentro da muralha (|x|,|z| ≲ 20).
           Exclusões impedem vegetação/inimigos de nascer na cidade e nos
           4 corredores de saída.
           ============================================================ -->
      <SpawnExclusion at="0 0" radius="30"></SpawnExclusion>

      <!-- Muralha quadrada (semi-lado 22, altura 3) com 4 portões cardeais
           (vão de 7 m centrado em cada eixo). collider=auto → bloqueia o
           jogador; os portões são a única passagem. -->
      <Composition
        place="at: 0 0; align-to-terrain: 0"
        body="fixed"
        collider="auto"
      >
        <!-- Norte (z=+22), vão central -->
        <Box pos="-12.75 1.5 22" size="18.5 3 0.6" color="#6a5236"></Box>
        <Box pos="12.75 1.5 22" size="18.5 3 0.6" color="#6a5236"></Box>
        <!-- Sul (z=-22) -->
        <Box pos="-12.75 1.5 -22" size="18.5 3 0.6" color="#6a5236"></Box>
        <Box pos="12.75 1.5 -22" size="18.5 3 0.6" color="#6a5236"></Box>
        <!-- Leste (x=+22) -->
        <Box pos="22 1.5 -12.75" size="0.6 3 18.5" color="#6a5236"></Box>
        <Box pos="22 1.5 12.75" size="0.6 3 18.5" color="#6a5236"></Box>
        <!-- Oeste (x=-22) -->
        <Box pos="-22 1.5 -12.75" size="0.6 3 18.5" color="#6a5236"></Box>
        <Box pos="-22 1.5 12.75" size="0.6 3 18.5" color="#6a5236"></Box>
        <!-- Torres de canto -->
        <Box pos="22 2.1 22" size="1.4 4.2 1.4" color="#5a4530"></Box>
        <Box pos="-22 2.1 22" size="1.4 4.2 1.4" color="#5a4530"></Box>
        <Box pos="22 2.1 -22" size="1.4 4.2 1.4" color="#5a4530"></Box>
        <Box pos="-22 2.1 -22" size="1.4 4.2 1.4" color="#5a4530"></Box>
        <!-- Postes de portão (enquadram cada vão) -->
        <Box pos="-3.5 1.8 22" size="0.5 3.6 0.7" color="#4a3018"></Box>
        <Box pos="3.5 1.8 22" size="0.5 3.6 0.7" color="#4a3018"></Box>
        <Box pos="-3.5 1.8 -22" size="0.5 3.6 0.7" color="#4a3018"></Box>
        <Box pos="3.5 1.8 -22" size="0.5 3.6 0.7" color="#4a3018"></Box>
        <Box pos="22 1.8 -3.5" size="0.7 3.6 0.5" color="#4a3018"></Box>
        <Box pos="22 1.8 3.5" size="0.7 3.6 0.5" color="#4a3018"></Box>
        <Box pos="-22 1.8 -3.5" size="0.7 3.6 0.5" color="#4a3018"></Box>
        <Box pos="-22 1.8 3.5" size="0.7 3.6 0.5" color="#4a3018"></Box>
      </Composition>

      <!-- Arcos de portão (lintéis) — decorativos, sem colisão para o vão
           ficar livre. -->
      <Composition place="at: 0 22; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 3.4 0" size="7.5 0.5 0.7" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: 0 -22; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 3.4 0" size="7.5 0.5 0.7" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: 22 0; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 3.4 0" size="0.7 0.5 7.5" color="#4a3018"></Box>
      </Composition>
      <Composition place="at: -22 0; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 3.4 0" size="0.7 0.5 7.5" color="#4a3018"></Box>
      </Composition>

      <!-- Praça central: poço + fogueira ladeando o ponto de nascimento. -->
      <Composition place="at: -7 6; align-to-terrain: 0" body="fixed" collider="auto">
        <Cylinder pos="0 0.45 0" size="1.3 1.3 0.9" color="#9a958c"></Cylinder>
        <Cylinder pos="0 0.55 0" size="1.0 1.0 0.1" color="#2f6fb0"></Cylinder>
        <Box pos="-1.15 1.0 0" size="0.16 1.7 0.16" color="#5a3a20"></Box>
        <Box pos="1.15 1.0 0" size="0.16 1.7 0.16" color="#5a3a20"></Box>
        <Box pos="0 1.85 0" size="2.6 0.12 0.12" color="#4a2f18"></Box>
        <Cylinder pos="0 2.4 0" size="0.05 1.5 0.95" color="#7a3b28"></Cylinder>
        <Box pos="0 1.45 0" size="0.5 0.5 0.5" color="#6b4a2b"></Box>
      </Composition>
      <Composition place="at: 7 -6; align-to-terrain: 0" body="fixed" collider="none">
        <Cylinder pos="0 0.12 0" size="1.0 1.15 0.25" color="#6f6a63"></Cylinder>
        <Cylinder pos="0 0.35 0" size="0.12 0.12 1.5" rotation="1.5 0 0.2" color="#5a3a20"></Cylinder>
        <Cylinder pos="0 0.35 0" size="0.12 0.12 1.5" rotation="1.5 1.0 -0.2" color="#6b4a2b"></Cylinder>
        <Sphere pos="0 0.7 0" size="0.55" color="#ff7722"></Sphere>
        <Sphere pos="0 1.05 0" size="0.32" color="#ffcc33"></Sphere>
        <PointLight pos="0 1.1 0" point-light="color: 0xff8a33; intensity: 3; distance: 10; decay: 2"></PointLight>
      </Composition>

      <!-- Mastro com bandeira da cidade junto ao poço. -->
      <Composition place="at: -7 9; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 2.0 0" size="0.1 4.0 0.1" color="#5a3a20"></Box>
        <Sphere pos="0 4.05 0" size="0.13" color="#d4b84a"></Sphere>
        <Box pos="0.5 3.2 0" size="0.06 1.0 0.8" color="#b03b3b"></Box>
        <Box pos="0.5 3.65 0" size="0.06 0.12 0.84" color="#d4b84a"></Box>
      </Composition>

      <!-- Quatro casas nos cantos diagonais (deixam os corredores cardeais
           livres). Cada casa = 1 entidade com corpo fixo e colisores compostos. -->
      <!-- Casa NE -->
      <Composition place="at: 13 13; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="5 0.2 5" color="#6b4a2b"></Box>
        <Box pos="0 1.4 -2.4" size="5 2.6 0.3" color="#d8c7a0"></Box>
        <Box pos="-2.4 1.4 0" size="0.3 2.6 5" color="#cdb88f"></Box>
        <Box pos="2.4 1.4 0" size="0.3 2.6 5" color="#cdb88f"></Box>
        <Box pos="-1.7 1.4 2.4" size="1.6 2.6 0.3" color="#d8c7a0"></Box>
        <Box pos="1.7 1.4 2.4" size="1.6 2.6 0.3" color="#d8c7a0"></Box>
        <Box pos="-1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 0.62" color="#7a3b28"></Box>
        <Box pos="1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 -0.62" color="#7a3b28"></Box>
        <PointLight pos="0 1.5 -0.5" point-light="color: 0xffcc88; intensity: 2; distance: 5; decay: 2"></PointLight>
      </Composition>
      <!-- Casa NW -->
      <Composition place="at: -13 13; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="4.4 0.2 4.4" color="#6b4a2b"></Box>
        <Box pos="0 1.3 -2.1" size="4.4 2.4 0.3" color="#c9b48a"></Box>
        <Box pos="-2.1 1.3 0" size="0.3 2.4 4.4" color="#bfa97e"></Box>
        <Box pos="2.1 1.3 0" size="0.3 2.4 4.4" color="#bfa97e"></Box>
        <Box pos="-1.5 1.3 2.1" size="1.4 2.4 0.3" color="#c9b48a"></Box>
        <Box pos="1.5 1.3 2.1" size="1.4 2.4 0.3" color="#c9b48a"></Box>
        <Box pos="-1.15 2.8 0" size="2.8 0.2 4.8" rotation="0 0 0.6" color="#6e4b2a"></Box>
        <Box pos="1.15 2.8 0" size="2.8 0.2 4.8" rotation="0 0 -0.6" color="#6e4b2a"></Box>
      </Composition>
      <!-- Casa SW (lareira acesa) -->
      <Composition place="at: -13 -13; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="5 0.2 5" color="#6b4a2b"></Box>
        <Box pos="0 1.4 -2.4" size="5 2.6 0.3" color="#cfc3b0"></Box>
        <Box pos="-2.4 1.4 0" size="0.3 2.6 5" color="#c4b8a4"></Box>
        <Box pos="2.4 1.4 0" size="0.3 2.6 5" color="#c4b8a4"></Box>
        <Box pos="-1.7 1.4 2.4" size="1.6 2.6 0.3" color="#cfc3b0"></Box>
        <Box pos="1.7 1.4 2.4" size="1.6 2.6 0.3" color="#cfc3b0"></Box>
        <Box pos="-1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 0.62" color="#55402a"></Box>
        <Box pos="1.3 3.05 0" size="3.1 0.2 5.4" rotation="0 0 -0.62" color="#55402a"></Box>
        <PointLight pos="0 1.5 -0.5" point-light="color: 0xffc070; intensity: 2; distance: 5; decay: 2"></PointLight>
      </Composition>
      <!-- Casa SE — longhouse do ancião (maior) -->
      <Composition place="at: 13 -13; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="0 0.1 0" size="7 0.2 5" color="#6b4a2b"></Box>
        <Box pos="0 1.6 -2.4" size="7 3.0 0.3" color="#d2c1a0"></Box>
        <Box pos="-3.4 1.6 0" size="0.3 3.0 5" color="#c8b896"></Box>
        <Box pos="3.4 1.6 0" size="0.3 3.0 5" color="#c8b896"></Box>
        <Box pos="-2.7 1.6 2.4" size="1.5 3.0 0.3" color="#d2c1a0"></Box>
        <Box pos="2.7 1.6 2.4" size="1.5 3.0 0.3" color="#d2c1a0"></Box>
        <Box pos="-1.9 3.4 0" size="4.0 0.22 5.4" rotation="0 0 0.6" color="#7a3b28"></Box>
        <Box pos="1.9 3.4 0" size="4.0 0.22 5.4" rotation="0 0 -0.6" color="#7a3b28"></Box>
        <Box pos="0 4.35 0" size="0.5 0.5 5.4" color="#5a3a20"></Box>
      </Composition>

      <!-- Bancas de mercado junto ao poço (oeste da praça). -->
      <Composition place="at: -10 0; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="-1.1 1.15 -0.7" size="0.1 2.3 0.1" color="#5a3a20"></Box>
        <Box pos="1.1 1.15 -0.7" size="0.1 2.3 0.1" color="#5a3a20"></Box>
        <Box pos="0 0.95 0" size="2.4 0.18 1.6" color="#8a5a30"></Box>
        <Box pos="-0.6 2.1 0" size="1.2 0.08 2.2" rotation="-0.5 0 0" color="#b03b3b"></Box>
        <Box pos="0.6 2.1 0" size="1.2 0.08 2.2" rotation="-0.5 0 0" color="#e8ddc8"></Box>
        <Sphere pos="-0.6 1.4 0" size="0.13" color="#cc3322"></Sphere>
        <Sphere pos="0.6 1.16 0.2" size="0.16" color="#e2a02a"></Sphere>
      </Composition>

      <!-- Quadro de avisos da cidade (perto do portão sul). -->
      <Composition place="at: 4 -16; align-to-terrain: 0" body="fixed" collider="auto">
        <Box pos="-0.7 0.7 0" size="0.12 1.4 0.12" color="#5a3a20"></Box>
        <Box pos="0.7 0.7 0" size="0.12 1.4 0.12" color="#5a3a20"></Box>
        <Box pos="0 1.35 0" size="1.8 1.0 0.1" color="#7a5230"></Box>
        <Box pos="0 1.55 0.06" size="1.5 0.5 0.04" color="#e8ddc8"></Box>
      </Composition>

      <!-- Tochas da praça (decorativas, sem colisão). -->
      <Composition place="at: 6 6; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.9 0" size="0.1 1.8 0.1" color="#5a3a20"></Box>
        <Sphere pos="0 2.0 0" size="0.18" color="#ffaa33"></Sphere>
        <PointLight pos="0 2.05 0" point-light="color: 0xffa83a; intensity: 1.6; distance: 7; decay: 2"></PointLight>
      </Composition>
      <Composition place="at: -6 -6; align-to-terrain: 0" body="fixed" collider="none">
        <Box pos="0 0.9 0" size="0.1 1.8 0.1" color="#5a3a20"></Box>
        <Sphere pos="0 2.0 0" size="0.18" color="#ffaa33"></Sphere>
        <PointLight pos="0 2.05 0" point-light="color: 0xffa83a; intensity: 1.6; distance: 7; decay: 2"></PointLight>
      </Composition>

      <!-- Comerciante da cidade: banca a leste da praça. Aproxime e [K]. -->
      <GameObject
        name="merchant"
        place="at: 9 2; align-to-terrain: 0"
        script="merchant.ts"
      ></GameObject>

      <!-- Santuários / leituras místicas na praça (sólidos, bloqueiam). -->
      <GameObject
        name="rune-pillar"
        place="at: -4 13; align-to-terrain: 1"
        rigidbody="type: fixed; mass: 0; gravity-scale: 0"
        collider="shape: trimesh; mesh-url: /assets/meshes/stone_pillar_collision.glb; mesh-anchor: base"
        script="stone-pillar.ts"
      ></GameObject>
      <GameObject
        name="crystal-shrine"
        place="at: 4 14; align-to-terrain: 1"
        rigidbody="type: fixed; mass: 0; gravity-scale: 0"
        collider="shape: trimesh; mesh-url: /assets/meshes/crystal_blue_collision.glb; mesh-anchor: base"
        script="crystal-shrine.ts"
      ></GameObject>

      <!-- Baú do tesouro perto da longhouse (canto SE da cidade). [F] -->
      <GameObject
        name="chest"
        place="at: 16 -8; align-to-terrain: 1"
        script="chest.ts"
        rigidbody="type: fixed; mass: 0; gravity-scale: 0"
        collider="shape: trimesh; mesh-url: /assets/meshes/treasure_chest_collision.glb; mesh-anchor: base"
      ></GameObject>

      <!-- ============================================================
           ANEL DO VALE — recursos básicos em volta da cidade (fora da
           muralha, dentro de ~±45). Carvalhos (madeira) + pedras (pedra).
           ============================================================ -->
      <StaticSpawner
        profile="tree"
        count="16"
        seed="7"
        region-min="-45 0 -45"
        region-max="45 0 45"
        align-to-terrain="1"
        ground-align="auto"
        scale-min="1.4"
        scale-max="2.4"
        avoid-overlaps="1"
      >
        <GameObject
          role="static"
          destructible="popup-text: Wood; popup-color: #8b4513; preset: dust; hits: 3; spark-on-hit: 1"
          script="tree.ts"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/tree_oak_collision.glb; mesh-anchor: base"
        >
          <GLTFLoader
            role="visual"
            url="/assets/meshes/tree_oak_lod0.glb"
            lod1-url="/assets/meshes/tree_oak_lod1.glb"
            lod2-url="/assets/meshes/tree_oak_lod2.glb"
          ></GLTFLoader>
          <ResourceNode kind="wood" yield="3" transform="pos: 0 0 0"></ResourceNode>
        </GameObject>
      </StaticSpawner>
      <StaticSpawner
        profile="tree"
        count="14"
        seed="99"
        region-min="-45 0 -45"
        region-max="45 0 45"
        align-to-terrain="1"
        ground-align="auto"
        scale-min="0.8"
        scale-max="1.4"
        avoid-overlaps="1"
      >
        <GameObject
          role="static"
          script="rock.ts"
          destructible="popup-text: Stone; popup-color: #cccccc; preset: explosion; hits: 3; spark-on-hit: 1"
          rigidbody="type: fixed; mass: 0; gravity-scale: 0"
          collider="shape: trimesh; mesh-url: /assets/meshes/rock_mossy_collision.glb; mesh-anchor: base"

        <DialogueNPC dialogue-id="peaks_frost" portrait-url="" voice-sfx=""></DialogueNPC>
        <Box pos="0 0.1 0" size="1.4 0.2 1.4" color="#7a8290"></Box>
        <Box pos="0 1.1 0" size="0.6 1.8 0.4" color="#5a8ab0"></Box>
        <Sphere pos="0 2.2 0" size="0.4" color="#e8eef5"></Sphere>
      </Composition>
      <Composition name="npc_peaks_ogre" place="at: -50 0; align-to-terrain: 1" body="none" collider="none">
        <DialogueNPC dialogue-id="peaks_ogre" portrait-url="" voice-sfx=""></DialogueNPC>
        <Box pos="0 0.1 0" size="1.4 0.2 1.4" color="#7a8290"></Box>
        <Box pos="0 1.1 0" size="0.6 1.8 0.4" color="#3a4a6a"></Box>
        <Sphere pos="0 2.2 0" size="0.4" color="#e8eef5"></Sphere>
      </Composition>

      <!-- Câmera 3ª pessoa. Teclas 1-6 alternam pós-processamento. -->
      <ThirdPersonCamera
        distance="4"
        height="1.6"
        pitch="0.28"
        follow-lag="0.18"
        turn-lag="0.38"
        mouse-sensitivity="0.003"
      ></ThirdPersonCamera>

      <PostFxDebugToggle></PostFxDebugToggle>

      <!-- HUD: camada declarativa screen-space + widgets (engine HudPlugin). -->
      <HudScreenLayer></HudScreenLayer>
      <HealthBar target-entity="hero" icon="❤"></HealthBar>
      <XpBar target-entity="hero"></XpBar>
      <ResourceChip resource="gold" icon="🪙" target-entity="hero"></ResourceChip>
      <ResourceChip resource="wood" icon="🪵" target-entity="hero"></ResourceChip>
      <ResourceChip resource="stone" icon="🪨" target-entity="hero"></ResourceChip>
      <Minimap range="60"></Minimap>
      <Compass></Compass>
      <BossBar target-entity="boss"></BossBar>
      <InteractionPrompt key="F" range="4.5" position="bottom-center"></InteractionPrompt>

      <!-- Diálogo (instância única). QuestTriggerSystem abre ao [F] perto de
           um <DialogueNPC>; QuestsTab lista as quests ativas. -->
      <DialogueBalloon></DialogueBalloon>

      <!-- Menu de pausa: modal tabbed com [Q]. -->
      <TabbedModal id="pause" key="q" target-entity="hero" title-key="modal.pause">
        <SkillsTab></SkillsTab>
        <InventoryTab columns="5"></InventoryTab>
        <OptionsTab>
          <OptionRow id="music-volume" type="slider" label-key="options.music" min="0" max="100" step="5" default="70"></OptionRow>
          <OptionRow id="sfx-volume" type="slider" label-key="options.sfx" min="0" max="100" step="5" default="80"></OptionRow>
          <OptionRow id="save" type="button" label-key="options.save"></OptionRow>
          <OptionRow id="load" type="button" label-key="options.load"></OptionRow>
          <OptionRow id="controls" type="note" label-key="options.controls"></OptionRow>
        </OptionsTab>
        <QuestsTab></QuestsTab>
      </TabbedModal>
    </Scene>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
