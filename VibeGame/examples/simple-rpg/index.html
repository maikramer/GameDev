<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Simples — Vale do Cristal (VibeGame)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <Scene
      canvas="#game-canvas"
      sky="#ffffff"
      resume-audio-on-user-gesture="true"
    >
      <EquirectSky url="/assets/sky/sky.png"></EquirectSky>

      <!-- Fill + sol: mais fill no hemisfério + sol um pouco mais alto = sombras mais curtas e terreno menos “enterrado”. -->
      <GameObject
        ambient-light="sky-color: 0xfff8f0; ground-color: 0xe0d0a8; intensity: 1.8"
        directional-light="color: 0xfff0d0; intensity: 3.0; direction-x: -0.7; direction-y: 3.5; direction-z: -0.6; cast-shadow: 1; shadow-map-size: 2048; distance: 120"
        postprocessing="enabled: 1; bloom: 1; bloom-strength: 0.35; bloom-radius: 0.5; bloom-threshold: 0.65; chromatic-aberration: 0; vignette: 1; vignette-offset: 0.3; vignette-darkness: 0.48; aa: smaa; tone-mapping: agx; ssao: 1; ssao-intensity: 0.4; ssao-radius: 0.8"
      >
      </GameObject>

      <AudioSource
        name="bgm"
        url="/assets/audio/bgm_field.wav"
        loop="true"
        volume="0.18"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-jump"
        url="/assets/audio/sfx_jump.wav"
        loop="false"
        volume="0.42"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-save"
        url="/assets/audio/sfx_save.wav"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-load"
        url="/assets/audio/sfx_load.wav"
        loop="false"
        volume="0.44"
        playing="false"
        spatial="false"
      ></AudioSource>
      <AudioSource
        name="sfx-heal"
        url="/assets/audio/sfx_collect.wav"
        loop="false"
        volume="0.48"
        playing="false"
        spatial="false"
      ></AudioSource>

      <!-- 2 km × 2 km terrain — quadtree LOD chunks (levels=4), 2048×2048 heightmap.
           Physics: one Rapier heightfield per visual chunk, built/freed dynamically. -->
      <Terrain
        pos="0 0 0"
        world-size="2000"
        max-height="130"
        levels="4"
        resolution="128"
        lod-hysteresis="1.3"
        lod-distance-ratio="2"
        height-smoothing="0.3"
        height-smoothing-spread="1.25"
        heightmap="/assets/terrain/heightmap.png"
        skirt-width="0.015625"
        roughness="0.78"
        metalness="0"
        normal-strength="1.0"
        base-color="#8cb866"
      ></Terrain>

      <!-- Água gerada dinamicamente a partir de /assets/terrain/terrain.json no bootstrap. -->

      <!-- Fog disabled temporarily -->

      <!-- WaveManager desativado enquanto ajustamos movimento/câmera -->
      <!-- <GameObject name="WaveManager" script="wave-manager.ts"></GameObject> -->

      <!-- Terreno XZ ∈ [-5000,5000] centrado na origem (world-size 10000). Colocar o herói no centro da ilha + câmera a olhar para dentro do mapa. -->
      <PlayerGLTF
        name="hero"
        pos="0 50 0"
        model-url="/assets/meshes/hero_rigged_animated.glb"
      >
      </PlayerGLTF>

      <!-- Instanced vegetation: 100 oak trees via GPU instancing -->
      <SpawnGroup
        profile="tree"
        count="100"
        seed="42"
        region-min="-200 0 -200"
        region-max="200 0 200"
        instanced="true"
        scale-min="2"
        scale-max="3.5"
        yaw-distribution="discrete"
        yaw-step-deg="45"
      >
        <GLTFDynamic
          role="dynamic"
          url="/assets/meshes/tree_oak_lod0.glb"
          lod1-url="/assets/meshes/tree_oak_lod1.glb"
          lod2-url="/assets/meshes/tree_oak_lod2.glb"
          body-type="fixed"
        />
      </SpawnGroup>

      <!-- Instanced rocks: scattered mossy boulders via GPU instancing -->
      <SpawnGroup
        profile="tree"
        count="30"
        seed="7"
        region-min="-220 0 -220"
        region-max="220 0 220"
        instanced="true"
        scale-min="0.5"
        scale-max="2.6"
      >
        <GLTFDynamic
          role="prop"
          url="/assets/meshes/rock_mossy_lod0.glb"
          lod1-url="/assets/meshes/rock_mossy_lod1.glb"
          lod2-url="/assets/meshes/rock_mossy_lod2.glb"
          body-type="fixed"
        />
      </SpawnGroup>

      <!-- Pós: nítido primeiro (sem CA); bloom/grain/vignette moderados — o pacote “AAA” anterior é que “desfocava”. -->
      <!-- Post-processing: bloom + vignette + SMAA + AGX tonemap + SSAO (moderate). CA off. Keys 1-6 toggle at runtime. -->
      <ThirdPersonCamera
        distance="4"
        height="1.6"
        pitch="0.28"
        position-smooth="0.08"
        mouse-sensitivity="0.003"
      ></ThirdPersonCamera>

      <!-- SpawnGroups disabled for perf testing -->
    </Scene>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
