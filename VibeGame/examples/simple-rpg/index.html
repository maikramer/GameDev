<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple RPG Demo — GameAssets + VibeGame</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <!--
      Scene layout generated by gameassets dream (see sample-gameassets/).
      GLBs: gameassets handoff → public/assets/models/<id>.glb
      Sky:  skymap2d generate  → public/assets/sky/sky.png
    -->
    <world canvas="#game-canvas" sky="#87CEEB">
      <!-- Procedural LOD terrain (no heightmap asset required) -->
      <terrain
        pos="0 0 0"
        world-size="256"
        max-height="50"
        levels="6"
        resolution="64"
      ></terrain>

      <!-- Ocean water plane at Y=5, matches terrain world-size -->
      <water
        pos="0 5 0"
        size="256"
        opacity="0.8"
        wave-speed="1.0"
        wave-scale="0.3"
      ></water>

      <!-- Player character with animated GLB model -->
      <player-gltf pos="0 60 0" model-url="/assets/models/hero.glb"></player-gltf>

      <follow-camera
        target-distance="6"
        target-pitch="0.35"
        yaw-smoothness="0.07"
        position-lag="0.14"
        auto-rotate-delay="0.4"
      ></follow-camera>

      <!-- Stone pillar landmark (origin at model center → lift by ~half height) -->
      <gltf-load
        url="/assets/models/stone_pillar.glb"
        transform="pos: 0 1 -8; scale: 1.5 1.5 1.5"
      ></gltf-load>

      <!-- Wooden crates (origin at center → base at ground) -->
      <gltf-load
        url="/assets/models/wooden_crate.glb"
        transform="pos: 5 0.4 3; scale: 1 1 1"
      ></gltf-load>
      <gltf-load
        url="/assets/models/wooden_crate.glb"
        transform="pos: 6.2 0.3 3.5; scale: 0.8 0.8 0.8"
      ></gltf-load>

      <!-- Blue crystal collectibles (floating above ground) -->
      <gltf-load
        url="/assets/models/crystal_blue.glb"
        transform="pos: -4 0.8 6; scale: 0.6 0.6 0.6"
      ></gltf-load>
      <gltf-load
        url="/assets/models/crystal_blue.glb"
        transform="pos: 10 0.8 -5; scale: 0.5 0.5 0.5"
      ></gltf-load>

      <!-- Trees (origin at model center → lift significantly for trunk base at ground) -->
      <gltf-load
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: -12 1.5 -3; scale: 2 2 2"
      ></gltf-load>
      <gltf-load
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: 15 1.4 8; scale: 1.8 1.8 1.8"
      ></gltf-load>
      <gltf-load
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: -8 1.7 12; scale: 2.2 2.2 2.2"
      ></gltf-load>
      <gltf-load
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: 20 1.2 -10; scale: 1.6 1.6 1.6"
      ></gltf-load>
    </world>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
