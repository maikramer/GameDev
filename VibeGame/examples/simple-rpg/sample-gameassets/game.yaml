title: Simple RPG Demo
genre: cartoon fantasy RPG
tone: bright cheerful adventure, vibrant colors, playful cartoon world
style_preset: painterly
output_dir: ../public/assets
path_layout: split
images_subdir: images
meshes_subdir: meshes
image_ext: png
seed_base: 42
generation: medium

# Round 2 — master pipeline (default ON desde Round 2).
# DAG: topology-fix → bake-master → LOD → collision → rigging →
# transfer-weights → animate → promote (lod0=animated/rigged/painted) → validate.
# Para forçar legacy: master_pipeline: false (ou --legacy-pipeline no batch).
master_validate: true
master_bake_normals: false # smart-defaults por categoria (humanoid/creature/...)
negative_keywords:
  - gore
  - realistic
  - photorealistic
  - dark gritty
  - scary
text2d:
  low_vram: true
  width: 768
  height: 768
text3d:
  export_origin: feet
paint3d:
  preserve_origin: true
rigging3d:
  output_suffix: _rigged
animator3d:
  preset: humanoid
audio_subdir: audio
text2sound:
  quality: medium
  audio_format: wav
