title: Simple RPG Demo
genre: cartoon fantasy RPG
tone: bright cheerful adventure, vibrant colors, playful cartoon world
style_preset: cartoon_fantasy
output_dir: ../public/assets
path_layout: split
images_subdir: images
meshes_subdir: meshes
image_ext: png
seed_base: 42
negative_keywords:
  - gore
  - realistic
  - photorealistic
  - dark gritty
  - scary
text2d:
  low_vram: true
  width: 768
  height: 768
text3d:
  preset: balanced
  low_vram: false
  export_origin: feet
paint3d:
  preserve_origin: true
rigging3d:
  output_suffix: _rigged
animator3d:
  preset: humanoid
audio_subdir: audio
text2sound:
  duration: 3
  steps: 100
  cfg_scale: 4.5
  audio_format: wav
