    category: building
    pipeline: [3d, paint, lod, collision]

  - id: scorpion_nest
    idea: 'cartoon desert scorpion nest mound of sand with dark tunnel hole, scattered bones around entrance, fantasy creature lair'
    kind: environment
    category: building
    pipeline: [3d, paint, lod, collision]

  # --- Creatures (desert) ---

  - id: scorpion
    idea: 'cartoon desert scorpion with segmented tan-orange tail ending in glowing red stinger, large pincers, eight legs, armored carapace, fantasy desert predator'
