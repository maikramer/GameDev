    category: vegetation
    pipeline: [3d, paint, lod, collision]
    lod_levels: 2

  - id: dead_bush
    idea: 'cartoon dry desert tumbleweed bush with twisted brown branches, sparse leaves, arid climate plant, fantasy desert prop'
    kind: prop
    category: vegetation
    pipeline: [3d, paint, lod, collision]

  # --- Structures (desert) ---

  - id: ruin_pillar
    idea: 'ancient cartoon sandstone ruin pillar with cracked carved hieroglyphs, weathered top, broken base, fantasy desert monument'
