<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple RPG Demo</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
      #game-canvas { display: block; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <Scene canvas="#game-canvas" sky="#87CEEB">
      <static-part
        pos="0 -0.5 0"
        shape="box"
        size="80 1 80"
        color="#4a7a3a"
      ></static-part>
      <Player pos="0 3 0"></Player>
      <OrbitCamera target-distance="14" target-pitch="-0.4"></OrbitCamera>

      <GLTFLoader
        url="/assets/models/hero.glb"
        transform="pos: 0 1 0; scale: 1 1 1"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/stone_pillar.glb"
        transform="pos: 0 0 -8; scale: 1.5 1.5 1.5"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/wooden_crate.glb"
        transform="pos: 5 0.5 3; scale: 1 1 1"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/wooden_crate.glb"
        transform="pos: 6.2 0.5 3.5; scale: 0.8 0.8 0.8"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/crystal_blue.glb"
        transform="pos: -4 1.2 6; scale: 0.6 0.6 0.6"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/crystal_blue.glb"
        transform="pos: 10 1.2 -5; scale: 0.5 0.5 0.5"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: -12 0 -3; scale: 2 2 2"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: 15 0 8; scale: 1.8 1.8 1.8"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: -8 0 12; scale: 2.2 2.2 2.2"
      ></GLTFLoader>
      <GLTFLoader
        url="/assets/models/tree_lowpoly.glb"
        transform="pos: 20 0 -10; scale: 1.6 1.6 1.6"
      ></GLTFLoader>
    </Scene>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
