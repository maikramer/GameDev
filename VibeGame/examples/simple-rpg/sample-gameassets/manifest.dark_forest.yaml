# manifest.dark_forest.yaml — floresta sombria biome subset.
# Run: gameassets batch --profile game.yaml --manifest manifest.dark_forest
# Categorias: vegetation (árvores), creature (inimigos), building (witch_hut).
assets:
  # --- Vegetation (dark forest) ---

  - id: pine_dark
    idea: 'tall cartoon dark pine tree with dense layered triangle foliage in deep forest green, narrow brown trunk, slightly gloomy stylized shape, dark fantasy forest tree'
    kind: environment
    category: vegetation
    pipeline: [3d, paint, lod, collision]
    lod_levels: 2

  - id: dead_tree
    idea: 'bare cartoon dead tree with twisted leafless branches, pale grey bark, gnarled spooky shape, dark fantasy forest silhouette'
    kind: environment
    category: vegetation
    pipeline: [3d, paint, lod, collision]
    lod_levels: 2

  - id: mushroom_glow
    idea: 'cartoon glowing blue mushroom cluster on mossy log, bioluminescent fantasy fungi, soft cyan light, dark forest floor prop'
    kind: prop
    category: vegetation
    pipeline: [3d, paint, lod, collision]

  # --- Structures (dark forest) ---

  - id: witch_hut
    idea: 'crooked cartoon witch hut with angled leaning walls, thatched roof, small glowing window, wooden door, dark fantasy forest dwelling'
    kind: environment
    category: building
    pipeline: [3d, paint, lod, collision]

  # --- Creatures (dark forest) ---

  - id: wolf
    idea: 'cartoon dark forest wolf with grey-black fur, yellow glowing eyes, snarling fangs, lean muscular body, fantasy predator creature, quadruped'
    kind: character
    category: creature
    pipeline: [3d, paint, rig, animate, lod, collision]
    lod_levels: 1

  - id: shade
    idea: 'cartoon shadow shade creature, floating dark ghostly wraith with glowing purple eyes, tattered cloak, ethereal smoky body, fantasy undead spirit'
    kind: character
    category: creature
    pipeline: [3d, paint, rig, animate, lod, collision]
    lod_levels: 1

  # --- Boss (dark forest) ---

  - id: witch_boss
    idea: 'menacing cartoon witch boss with long hooked nose, pointed black hat, tattered dark purple robe, glowing green hands, sinister grin, dark fantasy forest witch, standing upright, game asset'
    kind: character
    category: creature
    pipeline: [3d, paint, rig, animate, lod, collision]
    lod_levels: 1
    generation: high
