# Slime creature preset — melee AI tuning + assets/loot.
# Source of truth for the simple-rpg slime (see src/scripts/slime.ts).
melee-ai:
  slime:
    # MeleeAiConfig (consumed by the RpgAiSystem FSM)
    detectRange: 18
    attackRange: 3.0
    attackCooldown: 2.5
    attackDamage: 18
    chaseSpeed: 1.8
    wanderSpeed: 0.4
    wanderRadius: 8
    leashRadius: 30
    lungeWindup: 0.25
    lungeDuration: 0.3
    lungeRecovery: 0.5
    lungeStandoff: 2.2
    hoverMin: 2.0
    hoverMax: 5.0
    # Gameplay extensions (not read by the FSM; consumed by spawn/loot wiring)
    hp: 50
    assets:
      modelUrl: /assets/meshes/slime_rigged_animated.glb
      clips:
        idle: Animator3D_BreatheIdle
        walk: Animator3D_Walk
        run: Animator3D_Run
        lunge: Animator3D_Jump
        death: Animator3D_Fall
    loot:
      goldMin: 15
      goldMax: 30
