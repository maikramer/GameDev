<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeGame Example</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <world canvas="#game-canvas" sky="#87ceeb">
      <!-- Procedural terrain with LOD -->
      <terrain
        world-size="256"
        max-height="50"
        levels="6"
        resolution="64"
      ></terrain>

      <!-- Ball above terrain -->
      <dynamic-part
        pos="0 80 0"
        shape="sphere"
        size="1.0"
        color="#ff4500"
      ></dynamic-part>
    </world>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
