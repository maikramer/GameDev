<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeGame Example</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <Scene canvas="#game-canvas" sky="#87ceeb">
      <!-- Procedural terrain with LOD -->
      <Terrain
        world-size="256"
        max-height="50"
        levels="6"
        resolution="64"
      ></Terrain>

      <!-- Ball above terrain -->
      <dynamic-part
        pos="0 80 0"
        shape="sphere"
        size="1.0"
        color="#ff4500"
      ></dynamic-part>

      <!-- Deterministic terrain placement: <GameObject place="…"> anchors the root; children use local transforms -->
      <GameObject place="at: 0 -12; base-y-offset: 0.02">
        <ParticleSystem
          preset="fire"
          rate="12"
          lifetime="1.1"
          size="0.14"
          transform="pos: 0 0.25 0"
        ></ParticleSystem>
      </GameObject>
    </Scene>

    <canvas id="game-canvas"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
