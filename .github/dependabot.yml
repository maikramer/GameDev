# Atualizações automáticas de dependências (PRs semanais).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/Materialize"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
