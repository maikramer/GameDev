# CI for the GameDev monorepo.
# Text2D, Text3D, and Paint3D are not in the pytest matrix: heavy PyTorch / git deps; see smoke-heavy.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install --upgrade pip && pip install ruff pre-commit
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Run pre-commit
        run: pre-commit run --all-files

  test-python:
    name: pytest (${{ matrix.package }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Light packages — 3.10 + 3.12
          - package: Shared
            python-version: "3.10"
          - package: Shared
            python-version: "3.12"
          - package: GameAssets
            python-version: "3.10"
          - package: GameAssets
            python-version: "3.12"
          - package: Texture2D
            python-version: "3.10"
          - package: Texture2D
            python-version: "3.12"
          - package: Skymap2D
            python-version: "3.10"
          - package: Skymap2D
            python-version: "3.12"
          # Rigging3D — requires-python >=3.11,<3.12
          - package: Rigging3D
            python-version: "3.11"
          # Torch on CPU (single Python to keep CI time reasonable)
          - package: Part3D
            python-version: "3.12"
          - package: Text2Sound
            python-version: "3.12"
          # Light packages — GameDevLab
          - package: GameDevLab
            python-version: "3.10"
          - package: GameDevLab
            python-version: "3.12"
          # bpy wheel (cp313)
          - package: Animator3D
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e Shared/.[dev]
          pip install -e ${{ matrix.package }}/.[dev]
      - name: Run pytest
        run: pytest -v --tb=short
        working-directory: ${{ matrix.package }}

  test-rust:
    name: cargo (Materialize)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: rustfmt
        run: cargo fmt --all --manifest-path Materialize/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path Materialize/Cargo.toml -- -D warnings
      - name: Tests
        run: cargo test --manifest-path Materialize/Cargo.toml

  # Smoke: editable install + import do pacote (nomes de módulo reais).
  # Paint3D excluded: has bpy (huge) + pytorch deps, too heavy for CI.
  smoke-heavy:
    name: smoke (${{ matrix.dir }} → ${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: Text2D
            module: text2d
          - dir: Text3D
            module: text3d
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install -e Shared/
          pip install -e ${{ matrix.dir }}/
      - name: Import check
        run: python -c "import importlib; importlib.import_module('${{ matrix.module }}'); print('import OK:', '${{ matrix.module }}')"
