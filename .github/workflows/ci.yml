# CI for the GameDev monorepo.
# Text2D, Text3D, and Paint3D are not in the pytest matrix: heavy PyTorch / git deps; see smoke-heavy.
# Text2Sound and Part3D run pytest on CPU-only runners (torch wheels).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Ruff check
        run: uv run --python 3.12 ruff check .
      - name: Ruff format
        run: uv run --python 3.12 ruff format --check .
      - name: Run pre-commit
        run: uv run --python 3.12 pre-commit run --all-files

  test-python:
    name: pytest (${{ matrix.package }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Light packages — 3.10 + 3.12
          - package: Shared
            python-version: "3.10"
            install: uv pip install -e Shared/.[dev]
          - package: Shared
            python-version: "3.12"
            install: uv pip install -e Shared/.[dev]
          - package: GameAssets
            python-version: "3.10"
            install: uv pip install -e Shared/.[dev] && uv pip install -e GameAssets/.[dev]
          - package: GameAssets
            python-version: "3.12"
            install: uv pip install -e Shared/.[dev] && uv pip install -e GameAssets/.[dev]
          - package: Texture2D
            python-version: "3.10"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Texture2D/.[dev]
          - package: Texture2D
            python-version: "3.12"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Texture2D/.[dev]
          - package: Skymap2D
            python-version: "3.10"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Skymap2D/.[dev]
          - package: Skymap2D
            python-version: "3.12"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Skymap2D/.[dev]
          # Rigging3D — requires-python >=3.11,<3.12
          - package: Rigging3D
            python-version: "3.11"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Rigging3D/.[dev]
          # Torch on CPU (single Python to keep CI time reasonable)
          - package: Part3D
            python-version: "3.12"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Part3D/.[dev]
          - package: Text2Sound
            python-version: "3.12"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Text2Sound/.[dev]
          # Light packages — GameDevLab
          - package: GameDevLab
            python-version: "3.10"
            install: uv pip install -e Shared/.[dev] && uv pip install -e GameDevLab/.[dev]
          - package: GameDevLab
            python-version: "3.12"
            install: uv pip install -e Shared/.[dev] && uv pip install -e GameDevLab/.[dev]
          # bpy wheel (cp313)
          - package: Animator3D
            python-version: "3.13"
            install: uv pip install -e Shared/.[dev] && uv pip install -e Animator3D/.[dev]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Create venv and install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e Shared/.[dev]
          uv pip install -e ${{ matrix.package }}/.[dev]
      - name: Run pytest
        run: pytest -v --tb=short
        working-directory: ${{ matrix.package }}

  test-rust:
    name: cargo (Materialize)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: rustfmt
        run: cargo fmt --all --manifest-path Materialize/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path Materialize/Cargo.toml -- -D warnings
      - name: Tests
        run: cargo test --manifest-path Materialize/Cargo.toml

  # Smoke: editable install + import do pacote (nomes de módulo reais).
  # Paint3D excluded: has bpy (huge) + pytorch deps, too heavy for CI.
  smoke-heavy:
    name: smoke (${{ matrix.dir }} → ${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: Text2D
            module: text2d
          - dir: Text3D
            module: text3d
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Shared
        run: uv pip install -e Shared/
      - name: Install package (editable)
        run: uv pip install -e ${{ matrix.dir }}/
      - name: Import check
        run: python -c "import importlib; importlib.import_module('${{ matrix.module }}'); print('import OK:', '${{ matrix.module }}')"
