# CI for the GameDev monorepo.
# Text2D, Text3D, and Paint3D excluded: heavy PyTorch / diffusers deps, not viable on GPU-less runners.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('ruff.toml', '.pre-commit-config.yaml') }}
          restore-keys: pip-lint-${{ runner.os }}-
      - name: Install tools
        run: pip install --upgrade pip && pip install ruff pre-commit
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Run pre-commit
        run: pre-commit run --all-files

  test-python:
    name: pytest (${{ matrix.package }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shared only (no inter-package dependencies)
          - package: Shared
            python-version: "3.10"
          - package: Shared
            python-version: "3.12"
          # Other packages need Shared installed first via absolute path
          - package: GameAssets
            python-version: "3.10"
          - package: GameAssets
            python-version: "3.12"
          - package: Texture2D
            python-version: "3.10"
          - package: Texture2D
            python-version: "3.12"
          - package: Skymap2D
            python-version: "3.10"
          - package: Skymap2D
            python-version: "3.12"
          # Rigging3D — requires-python >=3.11,<3.12
          - package: Rigging3D
            python-version: "3.11"
          # Torch on CPU (single Python to keep CI time reasonable)
          - package: Part3D
            python-version: "3.12"
          - package: Text2Sound
            python-version: "3.12"
          # GameDevLab
          - package: GameDevLab
            python-version: "3.10"
          - package: GameDevLab
            python-version: "3.12"
          # bpy wheel (cp313)
          - package: Animator3D
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Get repo path
        id: repo
        run: echo "path=$(pwd)" >> $GITHUB_OUTPUT
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ matrix.package }}-${{ hashFiles(format('Shared/pyproject.toml', matrix.package, '/pyproject.toml')) }}
          restore-keys: |
            pip-${{ matrix.python-version }}-${{ matrix.package }}-
            pip-${{ matrix.python-version }}-
      - name: Install Shared (editable, by absolute path)
        run: pip install --upgrade pip && pip install -e ${{ steps.repo.outputs.path }}/Shared/.[dev]
      - name: Install package and run tests
        run: |
          pip install -e ${{ steps.repo.outputs.path }}/${{ matrix.package }}/.[dev]
          pytest -v --tb=short
        working-directory: ${{ steps.repo.outputs.path }}/${{ matrix.package }}

  test-rust:
    name: cargo (Materialize)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: rustfmt
        run: cargo fmt --all --manifest-path Materialize/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path Materialize/Cargo.toml -- -D warnings
      - name: Tests
        run: cargo test --manifest-path Materialize/Cargo.toml

  vibegame:
    name: VibeGame (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VibeGame
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('VibeGame/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bun run check
      - name: ESLint
        run: bun run lint
      - name: Prettier check
        run: bun run format:check
      - name: Tests
        run: bun test
      - name: Vite build
        run: bun run build
