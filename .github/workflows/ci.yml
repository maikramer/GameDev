name: CI

on:
  push:
    branches:
      - main

jobs:
  smoke-heavy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Shared
        run: |
          cd path/to/Shared
          npm install

      - name: Install Text2D
        run: |
          cd path/to/Text2D
          npm install

      - name: Install Text3D
        run: |
          cd path/to/Text3D
          npm install

      - name: Run tests
        run: npm test