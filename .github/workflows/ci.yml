# CI for the GameDev monorepo.
# Text2D, Text3D, Paint3D, and Text2Sound are intentionally not tested here: they depend on
# PyTorch/CUDA and large model downloads, which are too heavy for default GitHub-hosted runners.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      # Optional: run pre-commit for extra checks
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files || true

  test-python:
    name: pytest (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        include:
          - package: Shared
            install_cmd: cd Shared && pip install -e '.[dev]'
          - package: GameAssets
            install_cmd: cd Shared && pip install -e . && cd ../GameAssets && pip install -e '.[dev]'
          - package: Texture2D
            install_cmd: cd Shared && pip install -e . && cd ../Texture2D && pip install -e '.[dev]'
          - package: Skymap2D
            install_cmd: cd Shared && pip install -e . && cd ../Skymap2D && pip install -e '.[dev]'
          - package: Rigging3D
            install_cmd: cd Shared && pip install -e . && cd ../Rigging3D && pip install -e '.[dev]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            Shared/pyproject.toml
            ${{ matrix.package }}/pyproject.toml
      - name: Install package (Shared + target)
        run: ${{ matrix.install_cmd }}
      - name: Run pytest
        working-directory: ${{ matrix.package }}
        run: pytest -v --tb=short

  test-rust:
    name: cargo (Materialize)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy --manifest-path Materialize/Cargo.toml -- -D warnings
      - name: Tests
        run: cargo test --manifest-path Materialize/Cargo.toml

  # Smoke tests for heavy packages (no GPU, just import check)
  smoke-heavy:
    name: smoke (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: Text2D
          - package: Text3D
          - package: Paint3D
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Shared
        run: cd Shared && pip install -e . --quiet
      - name: Install package
        run: cd ${{ matrix.package }} && pip install -e . --quiet || echo "Install failed (may need GPU deps)"
      - name: Smoke test - import check
        run: |
          python -c "
          try:
            import ${{ matrix.package }}
            print('Import OK')
          except Exception as e:
            print(f'Import failed: {e}')
            exit(1)
          " || echo "Import test completed"
