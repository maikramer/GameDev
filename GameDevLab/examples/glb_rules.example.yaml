# Exemplo de regras para `gamedev-lab check glb modelo.glb rules.yaml`
# Campos opcionais — só os presentes são validados.

mesh_totals:
  vertex_count:
    min: 10
    max: 5000000
  face_count:
    max: 2000000

world_bounds:
  max_extent:
    max: 500.0

# Lista por índice de armature (0 = primeiro)
armatures:
  - bone_count:
      min: 1
      max: 512

# Ossos que devem existir em algum armature (nomes exactos)
bones_contain:
  - mixamorig:Hips

# Mínimo de clipes de animação no ficheiro
actions_min: 0

# Mínimo de meshes na cena
meshes_min: 1
