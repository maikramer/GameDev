# Preset local — passar sempre: --presets-local presets-local.yaml
# (ver GameAssets/README_PT.md)

vibrant_realistic:
  label: "Realista estilizado, cores saturadas (benchmark GPU)"
  prompt_prefix: >-
    stylized realistic game asset, jewel-tone saturated colors, rich color grading,
    vivid materials and specular highlights, PBR-friendly surfaces, clean studio lighting,
    single hero object centered, soft neutral backdrop, high clarity
  negative_suffix: >-
    desaturated, muddy colors, gray flat lighting, blurry, duplicate objects, text,
    watermark, UI, logo, horror gore
  hint_2d: "strong material read, color pops, consistent scale"
  hint_3d: "clean silhouette, watertight mesh suitable for real-time"
