# Benchmark realista colorido — otimizado RTX 4050 6GB + profiling
#
# Executar (nesta pasta):
#   export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:64
#   gameassets batch --profile game.yaml --manifest manifest.csv --with-3d \
#     --with-parts --with-rig --skip-audio --skip-text2d \
#     --presets-local presets-local.yaml \
#     --log batch_run.jsonl --profile-tools --profile-log gameassets_profile.jsonl
#
# IMPORTANTE: text3d.low_vram: false — com phased_batch, cada subprocesso
# (text3d, paint3d) vive sozinho, VRAM libertada entre eles → GPU a 100%.
# low_vram: true coloca Hunyuan na CPU (10-100x mais lento, GPU parada a 0%).

title: "Benchmark realista colorido"
genre: "fantasia contemporânea com materiais credíveis"
tone: "cores saturadas tipo jewel, luz de estúdio quente, acabamento de jogo AA"

style_preset: vibrant_realistic

negative_keywords:
  - "low poly faceted look unless prop is ceramic"
  - "neon cyberpunk palette"
  - "pedestal"
  - "ground plane"
  - "base slab"

output_dir: .
path_layout: split
images_subdir: images
meshes_subdir: meshes
image_ext: png

image_source: text2d

seed_base: 20260330

# Text2D: 512² equilibra velocidade e detalhe para Text3D/Paint
text2d:
  low_vram: true
  width: 512
  height: 512

# Text3D + Paint3D: VRAM 6GB — phased_batch liberta VRAM entre subprocessos
# low_vram: FALSE → Hunyuan3D na GPU (fp16, ~2-4 GB), ~30-60s/asset vs ~10-15 min em CPU
text3d:
  preset: fast
  low_vram: false
  texture: true
  phased_batch: true
  gpu_kill_others: true
  allow_shared_gpu: false
  mesh_smooth: 1
  paint_max_views: 3
  paint_view_resolution: 384
  paint_quantization: int4
  paint_tiny_vae: true
  paint_torch_compile: false

rigging3d:
  output_suffix: "_rigged"

# Part3D: int4 + segment_only evita "Can't export empty scenes!" com steps/octree baixos
part3d:
  steps: 50
  octree_resolution: 256
  num_chunks: 10000
  segment_only: true
  no_cpu_offload: false
  quantization: int4
  torch_compile: false
  no_attention_slicing: false
  low_vram_mode: false
  parts_suffix: "_parts"
  segmented_suffix: "_segmented"
