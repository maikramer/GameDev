      duration: 0.5
      preset: ui-confirm
      trim: true

  - id: goblin_warrior
    idea: "goblin guerreiro verde pequeno com armadura de couro e espada enferrujada, low poly"
    kind: character
    category: humanoid
    pipeline: [3d, rig, animate, parts]
